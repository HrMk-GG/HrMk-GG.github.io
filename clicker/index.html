<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Simulator - Egg List & Delete Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            transition: background 0.5s ease;
            color: white;
            overflow: hidden;
            user-select: none;
        }

        .stage-0 { background: #1e90ff; }
        .stage-1 { background: #f39c12; }
        .stage-2 { background: #2c3e50; }
        .stage-3 { background: #8e44ad; }

        .font-luckiest { font-family: 'Fredoka One', cursive; }

        .btn-3d {
            position: relative;
            transition: all 0.1s;
            border-bottom: 6px solid rgba(0,0,0,0.2);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
        }
        .btn-3d:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }

        .float-animation {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .pet-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 100%);
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.1);
        }

        .glass-panel {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .coin-particle {
            position: absolute;
            pointer-events: none;
            animation: floatUp 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
            font-family: 'Fredoka One', cursive;
            z-index: 100;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
            100% { transform: translateY(-120px) scale(1); opacity: 0; }
        }

        .rarity-legendary-bg {
            background: linear-gradient(45deg, #f1c40f, #e67e22, #e74c3c, #9b59b6, #3498db, #2ecc71);
            background-size: 400% 400%;
            animation: rainbow 5s ease infinite;
        }
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .scroll-hide::-webkit-scrollbar { display: none; }
        
        .animate-pop { animation: pop 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="h-screen flex stage-0" id="game-body">

    <!-- Sidebar Menu -->
    <div class="w-20 glass-panel m-4 rounded-3xl flex flex-col items-center py-6 gap-6 z-40">
        <button onclick="toggleMenu('inventory')" class="w-12 h-12 rounded-xl bg-blue-500 btn-3d flex items-center justify-center text-xl shadow-lg">
            <i class="fas fa-paw"></i>
        </button>
        <button onclick="toggleMenu('stages')" class="w-12 h-12 rounded-xl bg-purple-500 btn-3d flex items-center justify-center text-xl shadow-lg">
            <i class="fas fa-map-marked-alt"></i>
        </button>
        <div class="flex-1"></div>
        <button onclick="clearData()" class="w-12 h-12 rounded-xl bg-red-500 btn-3d flex items-center justify-center text-xl shadow-lg">
            <i class="fas fa-trash"></i>
        </button>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col relative overflow-hidden">
        
        <!-- HUD -->
        <div class="flex justify-between items-start p-6">
            <div class="flex flex-col gap-2">
                <div class="glass-panel px-4 py-2 rounded-full flex items-center gap-3">
                    <span class="text-xl">💰</span>
                    <span id="coin-display" class="font-luckiest text-xl text-yellow-300">0</span>
                </div>
            </div>
            <div class="glass-panel px-6 py-2 rounded-2xl text-center min-w-[150px]">
                <span id="stage-name" class="text-xs font-black uppercase tracking-widest text-blue-200">Grassland</span>
                <div class="text-xl font-luckiest" id="power-display">1 ⚡</div>
            </div>
        </div>

        <!-- Center Target -->
        <div class="flex-1 flex flex-col items-center justify-center">
            <div id="click-target" class="relative cursor-pointer hover:scale-105 active:scale-95 transition-transform">
                <div id="main-target-emoji" class="text-[120px] md:text-[160px] drop-shadow-2xl float-animation">🥚</div>
            </div>
        </div>

        <!-- Egg Area -->
        <div class="p-6 flex flex-col items-center">
            <!-- Egg Probability List -->
            <div id="egg-info-panel" class="glass-panel mb-4 p-3 rounded-2xl w-full max-w-md flex flex-wrap justify-center gap-3 animate-pop">
                <!-- Probabilities injected here -->
            </div>

            <div class="glass-panel p-4 rounded-[30px] flex items-center gap-4 w-full max-w-4xl">
                <div class="bg-blue-600/50 p-3 rounded-2xl text-center min-w-[80px]">
                    <div class="text-[10px] font-bold">INVENTORY</div>
                    <div class="font-luckiest text-lg"><span id="pet-count">0</span>/20</div>
                </div>
                
                <div id="pet-list" class="flex-1 flex gap-3 overflow-x-auto scroll-hide py-1"></div>

                <button onclick="buyEgg()" class="bg-gradient-to-b from-green-400 to-green-600 px-6 py-3 rounded-2xl btn-3d font-luckiest flex flex-col items-center">
                    <span id="egg-label" class="text-[10px] font-bold">GRASS EGG</span>
                    <div class="flex items-center gap-2">
                        <span id="egg-cost">100</span><span class="text-sm">💰</span>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- Inventory/Stage Modal -->
    <div id="menu-overlay" class="fixed inset-0 z-50 bg-black/70 flex items-center justify-center hidden p-4">
        <div class="glass-panel w-full max-w-lg p-8 rounded-[40px] relative">
            <button onclick="toggleMenu()" class="absolute -top-4 -right-4 w-12 h-12 bg-red-500 rounded-full btn-3d flex items-center justify-center">
                <i class="fas fa-times"></i>
            </button>
            
            <div id="menu-content-inventory" class="menu-tab hidden">
                <h2 class="font-luckiest text-3xl text-blue-400 mb-6 uppercase">My Pets</h2>
                <div id="full-pet-grid" class="grid grid-cols-3 gap-4 max-h-[400px] overflow-y-auto pr-2 scroll-hide"></div>
            </div>

            <div id="menu-content-stages" class="menu-tab hidden">
                <h2 class="font-luckiest text-3xl text-purple-400 mb-6 uppercase">Travel</h2>
                <div id="stage-grid" class="flex flex-col gap-4 max-h-[400px] overflow-y-auto scroll-hide"></div>
            </div>
        </div>
    </div>

    <!-- Gacha Result -->
    <div id="gacha-modal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/90 hidden px-4">
        <div id="modal-content" class="bg-white/10 backdrop-blur-xl p-10 rounded-[40px] border-4 border-white/20 text-center max-w-sm w-full">
            <h3 class="font-luckiest text-xl text-yellow-400 mb-8 uppercase">A New Pet!</h3>
            <div id="gacha-icon" class="text-9xl mb-8 drop-shadow-2xl">🐶</div>
            <div id="gacha-name" class="font-luckiest text-3xl mb-1 uppercase">DOGGY</div>
            <div id="gacha-rarity" class="text-sm font-black mb-8">COMMON</div>
            <button onclick="closeGacha()" class="w-full bg-green-500 py-4 rounded-2xl btn-3d text-xl font-luckiest uppercase tracking-wider">Sweet!</button>
        </div>
    </div>

    <script>
        let coins = 0;
        let pets = [];
        let currentStageIdx = 0;
        let unlockedStages = [0];

        const stages = [
            { 
                name: "Grassland", cost: 0, multiplier: 1, emoji: "🥚", bgColor: "stage-0", eggName: "GRASS EGG", eggCost: 100,
                pool: [
                    { emoji: '🐶', name: 'Doggy', rarity: 'Common', power: 1, chance: 0.4 },
                    { emoji: '🐱', name: 'Kitty', rarity: 'Common', power: 2, chance: 0.35 },
                    { emoji: '🐰', name: 'Bunny', rarity: 'Rare', power: 10, chance: 0.2 },
                    { emoji: '🦄', name: 'Unicorn', rarity: 'Legendary', power: 100, chance: 0.05 }
                ]
            },
            { 
                name: "Desert", cost: 2500, multiplier: 8, emoji: "🌵", bgColor: "stage-1", eggName: "DESERT EGG", eggCost: 1000,
                pool: [
                    { emoji: '🐫', name: 'Camel', rarity: 'Common', power: 20, chance: 0.4 },
                    { emoji: '🐍', name: 'Snake', rarity: 'Common', power: 25, chance: 0.35 },
                    { emoji: '🦂', name: 'Scorpion', rarity: 'Rare', power: 80, chance: 0.2 },
                    { emoji: '🧞', name: 'Genie', rarity: 'Legendary', power: 500, chance: 0.05 }
                ]
            },
            { 
                name: "Frozen", cost: 25000, multiplier: 40, emoji: "❄️", bgColor: "stage-2", eggName: "SNOW EGG", eggCost: 10000,
                pool: [
                    { emoji: '🐧', name: 'Penguin', rarity: 'Common', power: 150, chance: 0.4 },
                    { emoji: '🐻‍❄️', name: 'Polar Bear', rarity: 'Common', power: 180, chance: 0.35 },
                    { emoji: '🦌', name: 'Reindeer', rarity: 'Rare', power: 450, chance: 0.2 },
                    { emoji: '🧊', name: 'Yeti', rarity: 'Legendary', power: 3000, chance: 0.05 }
                ]
            },
            { 
                name: "Volcano", cost: 250000, multiplier: 200, emoji: "🔥", bgColor: "stage-3", eggName: "MAGMA EGG", eggCost: 100000,
                pool: [
                    { emoji: '🦎', name: 'Lava Liz', rarity: 'Common', power: 1200, chance: 0.4 },
                    { emoji: '🦅', name: 'Phoenix', rarity: 'Common', power: 1500, chance: 0.35 },
                    { emoji: '🦖', name: 'Dino', rarity: 'Rare', power: 4000, chance: 0.2 },
                    { emoji: '🐲', name: 'Dragon', rarity: 'Legendary', power: 25000, chance: 0.05 }
                ]
            }
        ];

        function getClickPower() {
            let petPower = pets.reduce((sum, pet) => sum + pet.power, 0);
            return (1 + petPower) * stages[currentStageIdx].multiplier;
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return Math.floor(num).toLocaleString();
        }

        function updateUI() {
            const s = stages[currentStageIdx];
            document.getElementById('coin-display').innerText = formatNumber(coins);
            document.getElementById('power-display').innerText = formatNumber(getClickPower()) + ' ⚡';
            document.getElementById('stage-name').innerText = s.name;
            document.getElementById('main-target-emoji').innerText = s.emoji;
            document.getElementById('egg-label').innerText = s.eggName;
            document.getElementById('egg-cost').innerText = formatNumber(s.eggCost);
            document.getElementById('pet-count').innerText = pets.length;
            
            const body = document.getElementById('game-body');
            stages.forEach(st => body.classList.remove(st.bgColor));
            body.classList.add(s.bgColor);

            updateEggInfo();
            renderQuickPetList();
        }

        function updateEggInfo() {
            const panel = document.getElementById('egg-info-panel');
            panel.innerHTML = '';
            stages[currentStageIdx].pool.forEach(p => {
                const item = document.createElement('div');
                item.className = 'flex items-center gap-1 bg-white/10 px-2 py-1 rounded-lg text-[10px] font-bold';
                const color = p.rarity === 'Legendary' ? 'text-yellow-400' : (p.rarity === 'Rare' ? 'text-blue-400' : 'text-gray-300');
                item.innerHTML = `<span>${p.emoji}</span> <span class="${color}">${(p.chance * 100).toFixed(0)}%</span>`;
                panel.appendChild(item);
            });
        }

        document.getElementById('click-target').addEventListener('click', (e) => {
            const p = getClickPower();
            coins += p;
            spawnParticle(e.clientX, e.clientY, `+${formatNumber(p)} 💰`, '#fcd34d');
            updateUI();
        });

        function spawnParticle(x, y, text, color) {
            const el = document.createElement('div');
            el.className = 'coin-particle';
            el.innerHTML = text;
            el.style.left = `${x}px`; el.style.top = `${y}px`;
            el.style.color = color;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 600);
        }

        function toggleMenu(tabName) {
            const overlay = document.getElementById('menu-overlay');
            if (!tabName) { overlay.classList.add('hidden'); return; }
            document.querySelectorAll('.menu-tab').forEach(t => t.classList.add('hidden'));
            document.getElementById(`menu-content-${tabName}`).classList.remove('hidden');
            if (tabName === 'stages') renderStages();
            if (tabName === 'inventory') renderInventory();
            overlay.classList.remove('hidden');
        }

        function renderStages() {
            const grid = document.getElementById('stage-grid');
            grid.innerHTML = '';
            stages.forEach((s, idx) => {
                const unlocked = unlockedStages.includes(idx);
                const card = document.createElement('div');
                card.className = `p-4 rounded-2xl flex justify-between items-center ${unlocked ? 'bg-white/10' : 'bg-black/40 opacity-70'}`;
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-3xl">${s.emoji}</span>
                        <div><div class="font-luckiest">${s.name}</div><div class="text-[10px]">x${s.multiplier} Boost</div></div>
                    </div>
                    ${unlocked ? 
                        `<button onclick="setStage(${idx})" class="bg-blue-500 px-4 py-2 rounded-xl btn-3d font-bold text-xs">${currentStageIdx === idx ? 'HERE' : 'GO'}</button>` : 
                        `<button onclick="unlockStage(${idx})" class="bg-yellow-500 px-4 py-2 rounded-xl btn-3d font-bold text-black text-xs">${formatNumber(s.cost)} 💰</button>`}
                `;
                grid.appendChild(card);
            });
        }

        function setStage(idx) { currentStageIdx = idx; toggleMenu(); updateUI(); }
        function unlockStage(idx) { 
            if (coins >= stages[idx].cost) { coins -= stages[idx].cost; unlockedStages.push(idx); setStage(idx); }
        }

        function buyEgg() {
            const s = stages[currentStageIdx];
            if (coins < s.eggCost || pets.length >= 20) return;
            coins -= s.eggCost;
            const rand = Math.random();
            let sum = 0, selected;
            for (let p of s.pool) { sum += p.chance; if (rand < sum) { selected = p; break; } }
            const pet = { ...selected, id: Date.now() + Math.random() };
            pets.push(pet);
            showGacha(pet);
            updateUI();
        }

        function showGacha(pet) {
            const modal = document.getElementById('gacha-modal');
            const content = document.getElementById('modal-content');
            document.getElementById('gacha-icon').innerText = pet.emoji;
            document.getElementById('gacha-name').innerText = pet.name;
            document.getElementById('gacha-rarity').innerText = pet.rarity;
            if (pet.rarity === 'Legendary') content.classList.add('rarity-legendary-bg');
            else content.classList.remove('rarity-legendary-bg');
            modal.classList.remove('hidden');
        }
        function closeGacha() { document.getElementById('gacha-modal').classList.add('hidden'); }

        function renderQuickPetList() {
            const list = document.getElementById('pet-list');
            list.innerHTML = '';
            pets.slice(-5).reverse().forEach(p => {
                const card = document.createElement('div');
                card.className = `pet-card flex-shrink-0 w-16 h-20 flex flex-col items-center justify-center p-1 text-center ${p.rarity === 'Legendary' ? 'rarity-legendary-bg' : ''}`;
                card.innerHTML = `<div class="text-2xl">${p.emoji}</div><div class="text-[8px] font-black uppercase truncate w-full">${p.name}</div>`;
                list.appendChild(card);
            });
        }

        function renderInventory() {
            const grid = document.getElementById('full-pet-grid');
            grid.innerHTML = '';
            pets.slice().reverse().forEach(p => {
                const card = document.createElement('div');
                card.className = `pet-card p-4 text-center flex flex-col items-center ${p.rarity === 'Legendary' ? 'rarity-legendary-bg' : ''}`;
                card.innerHTML = `
                    <div class="text-4xl mb-1">${p.emoji}</div>
                    <div class="text-[10px] font-luckiest uppercase">${p.name}</div>
                    <div class="text-[8px] font-bold text-yellow-300">+${formatNumber(p.power)}</div>
                    <button onclick="deletePet(${p.id})" class="mt-3 bg-red-500/50 hover:bg-red-500 px-2 py-1 rounded-lg text-[8px] font-bold uppercase transition-colors">Release</button>
                `;
                grid.appendChild(card);
            });
        }

        function deletePet(id) {
            if (confirm("このペットを逃がしてあげますか？😢")) {
                pets = pets.filter(p => p.id !== id);
                renderInventory();
                updateUI();
            }
        }

        function saveGame() {
            localStorage.setItem('petSimSave_V6', JSON.stringify({ coins, pets, currentStageIdx, unlockedStages }));
        }

        function loadGame() {
            const data = JSON.parse(localStorage.getItem('petSimSave_V6'));
            if (data) {
                coins = data.coins || 0;
                pets = data.pets || [];
                currentStageIdx = data.currentStageIdx || 0;
                unlockedStages = data.unlockedStages || [0];
                updateUI();
            }
        }

        function clearData() { if (confirm("全データをリセットする？")) { localStorage.removeItem('petSimSave_V6'); location.reload(); } }

        window.onload = loadGame;
        setInterval(saveGame, 5000);
    </script>
</body>
</html>
