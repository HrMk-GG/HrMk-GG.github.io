<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VHS CAM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#000;overflow:hidden;height:100dvh;width:100vw;font-family:'Courier New',monospace}
#app{position:relative;width:100vw;height:100dvh;background:#000;overflow:hidden;display:flex;flex-direction:column}
#src-video{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;top:0;left:0}
#vf{position:relative;flex:1;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center}
#main-canvas{display:block;width:100%;height:100%;object-fit:contain}

/* Heavy CRT scanlines */
#scanlines{
  position:absolute;inset:0;pointer-events:none;z-index:5;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0) 0px, rgba(0,0,0,0) 1px,
    rgba(0,0,0,0.42) 1px, rgba(0,0,0,0.42) 2px
  );
}
/* Phosphor glow pulse */
#scanlines::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,255,80,0.015) 0px, rgba(0,255,80,0.015) 1px,
    transparent 1px, transparent 4px
  );
  animation:phosphor 0.15s linear infinite;
}
@keyframes phosphor{0%{opacity:1}50%{opacity:0.7}100%{opacity:1}}

/* Screen warp / vignette */
#vignette{
  position:absolute;inset:0;pointer-events:none;z-index:6;
  background:radial-gradient(ellipse 115% 115% at 50% 50%,
    transparent 25%,
    rgba(0,0,0,0.35) 60%,
    rgba(0,0,0,0.88) 100%
  );
}
/* CRT edge darkening */
#vignette::after{
  content:'';position:absolute;inset:0;
  box-shadow:inset 0 0 120px 40px rgba(0,0,0,0.75);
  border-radius:4%/3%;
}

/* ── HUD ── */
#hud{position:absolute;inset:0;pointer-events:none;z-index:20;padding:10px 12px}
#hud-tl{position:absolute;top:10px;left:12px;display:flex;flex-direction:column;gap:4px}
#hud-tr{position:absolute;top:10px;right:12px;text-align:right;display:flex;flex-direction:column;gap:3px;align-items:flex-end}
#hud-bl{position:absolute;bottom:10px;left:12px;display:flex;flex-direction:column;gap:2px}
#hud-br{position:absolute;bottom:10px;right:12px;text-align:right}

.vt{font-family:'Courier New',monospace;font-weight:700;letter-spacing:0.06em}
.sm{font-size:10px}.md{font-size:13px}.lg{font-size:15px}
.cw{color:#dde8dd}.cy{color:#f5c842}.cr{color:#ff3030}.cc{color:#30ddf0}.cg{color:#30d060}
.glow-y{text-shadow:0 0 8px #f5c842aa,1px 1px 0 #000}
.glow-r{text-shadow:0 0 8px #ff3030aa,1px 1px 0 #000}
.glow-w{text-shadow:0 0 5px #ffffff55,1px 1px 0 #000}

#rec-row{display:flex;align-items:center;gap:5px;opacity:0;transition:opacity 0.1s}
#rec-row.on{opacity:1;animation:rb 0.9s step-end infinite}
@keyframes rb{0%,100%{opacity:1}50%{opacity:0.05}}
#rec-dot{width:9px;height:9px;border-radius:50%;background:#ff3030;box-shadow:0 0 8px #ff0000,0 0 16px #ff000066}

#timecode{
  font-family:'Courier New',monospace;font-size:14px;font-weight:700;
  color:#f5c842;letter-spacing:0.12em;
  text-shadow:0 0 12px #f5c84288,0 0 24px #f5c84244,1px 1px 0 #000;
}
#datestamp{font-size:11px;color:#f0922a;font-family:'Courier New',monospace;font-weight:700;letter-spacing:0.08em;text-shadow:0 0 6px #f0922a88,1px 1px 0 #000}
#rec-elapsed{font-size:12px;color:#ff3030;font-weight:700;letter-spacing:0.1em;text-shadow:0 0 8px #ff000088;display:none}

/* ── BOTTOM UI ── */
#bottom-ui{
  background:linear-gradient(to bottom,#0c0c0c,#070707);
  border-top:1px solid #181818;
  padding:10px 18px 30px;
  flex-shrink:0;
}
#mode-tabs{display:flex;justify-content:center;gap:0;margin-bottom:12px}
.mtab{
  background:none;border:none;border-bottom:2px solid transparent;
  font-family:'Courier New',monospace;font-size:11px;font-weight:700;
  letter-spacing:0.15em;color:rgba(255,255,255,0.28);
  padding:3px 18px;cursor:pointer;transition:all 0.18s;text-transform:uppercase;
}
.mtab.active{color:#f5c842;border-bottom-color:#f5c842}

#ctrl-row{display:flex;align-items:center;justify-content:space-between}

#ratio-stack{display:flex;flex-direction:column;gap:5px;min-width:40px}
.rbtn{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.14);
  border-radius:3px;color:rgba(255,255,255,0.3);font-family:'Courier New',monospace;
  font-size:9px;font-weight:700;letter-spacing:0.04em;
  padding:3px 0;text-align:center;cursor:pointer;transition:all 0.12s;width:40px;
}
.rbtn.active{background:#f5c842;border-color:#f5c842;color:#000}

#shutter-wrap{display:flex;flex-direction:column;align-items:center;gap:5px}
#shutter{
  width:76px;height:76px;border-radius:50%;
  border:3px solid rgba(255,255,255,0.88);background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.08s;
  box-shadow:0 0 0 1px rgba(255,255,255,0.12),0 0 20px rgba(255,255,255,0.04);
}
#shutter:active{transform:scale(0.88)}
#si{
  width:62px;height:62px;border-radius:50%;background:#fff;
  transition:background 0.14s,border-radius 0.14s,width 0.14s,height 0.14s;
}
#si.rmode{background:#ff3030;border-radius:10px;width:30px;height:30px;box-shadow:0 0 14px #ff000099}
#sl{font-family:'Courier New',monospace;font-size:9px;color:rgba(255,255,255,0.28);letter-spacing:0.12em}

#gal-btn{
  width:58px;height:58px;border-radius:6px;border:1px solid rgba(255,255,255,0.22);
  overflow:hidden;cursor:pointer;background:rgba(255,255,255,0.04);
  display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;
}
#gal-thumb{width:100%;height:100%;object-fit:cover;display:none}
#gal-icon{color:rgba(255,255,255,0.28);font-size:24px;line-height:1}
#gal-count{
  position:absolute;top:2px;right:3px;
  background:#f5c842;color:#000;font-family:'Courier New',monospace;
  font-size:8px;font-weight:700;border-radius:2px;padding:1px 3px;display:none;
}

/* ── GALLERY ── */
#gal-panel{position:fixed;inset:0;background:#040404;z-index:100;display:none;flex-direction:column}
#gal-panel.open{display:flex}
#gal-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #161616}
#gal-title{font-family:'Courier New',monospace;font-size:13px;font-weight:700;color:#f5c842;letter-spacing:0.18em}
#gal-close{background:none;border:1px solid #252525;border-radius:4px;color:#aaa;font-family:'Courier New',monospace;font-size:11px;padding:4px 10px;cursor:pointer;letter-spacing:0.08em}
#gal-grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px}
.gi{aspect-ratio:1;overflow:hidden;cursor:pointer;background:#101010;position:relative}
.gi img,.gi video{width:100%;height:100%;object-fit:cover;display:block}
.gbadge{position:absolute;bottom:3px;left:3px;font-family:'Courier New',monospace;font-size:8px;font-weight:700;background:rgba(0,0,0,0.8);color:#f5c842;padding:1px 4px;border-radius:2px;letter-spacing:0.05em}
#gal-empty{color:rgba(255,255,255,0.18);font-family:'Courier New',monospace;font-size:11px;text-align:center;padding:60px 20px;line-height:2.2;letter-spacing:0.1em}

/* ── LIGHTBOX ── */
#lb{position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center}
#lb.open{display:flex}
#lb-img{max-width:100%;max-height:72dvh;object-fit:contain;display:none}
#lb-vid{max-width:100%;max-height:72dvh;object-fit:contain;display:none}
#lb-btns{display:flex;gap:12px;margin-top:18px}
.lbb{background:rgba(255,255,255,0.07);border:1px solid #222;border-radius:4px;color:#ccc;font-family:'Courier New',monospace;font-size:10px;padding:7px 16px;cursor:pointer;letter-spacing:0.1em}

#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:300;transition:opacity 0.04s}
#flash.on{opacity:1}

#no-cam{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:40px;background:#030303;z-index:10}
#no-cam p{font-family:'Courier New',monospace;font-size:12px;color:rgba(255,255,255,0.4);line-height:1.9;letter-spacing:0.06em}
.nc-t{font-size:16px!important;color:#f5c842!important;font-weight:700;letter-spacing:0.2em!important}

#brand{position:absolute;top:50%;right:6px;transform:translateY(-50%) rotate(90deg);font-family:'Courier New',monospace;font-size:8px;font-weight:700;color:rgba(255,255,255,0.1);letter-spacing:0.3em;pointer-events:none;z-index:15;white-space:nowrap}
</style>
</head>
<body>
<div id="app">
  <video id="src-video" autoplay playsinline muted></video>

  <div id="vf">
    <canvas id="main-canvas"></canvas>
    <div id="scanlines"></div>
    <div id="vignette"></div>
    <div id="brand">VIDEOCAM · HI8 · NTSC · SP</div>

    <!-- MODE TABS inside vf top -->
    <div style="position:absolute;top:0;left:0;right:0;z-index:25;display:flex;justify-content:center;padding:8px 0 2px">
      <div id="mode-tabs">
        <button class="mtab active" data-m="photo" onclick="setMode('photo')">PHOTO</button>
        <button class="mtab" data-m="video" onclick="setMode('video')">VIDEO</button>
      </div>
    </div>

    <!-- HUD -->
    <div id="hud">
      <div id="hud-tl">
        <div id="rec-row"><div id="rec-dot"></div><span class="vt md cr glow-r">REC</span></div>
        <div id="rec-elapsed" class="vt md cr glow-r"></div>
        <span class="vt sm cw glow-w">SP ◼ T-120</span>
        <span class="vt sm cw glow-w" id="mode-lbl">■ CAMERA</span>
      </div>
      <div id="hud-tr">
        <div id="timecode">00:00:00:00</div>
        <div id="datestamp"></div>
        <div id="batt" class="vt sm cw glow-w">▮▮▮▮ BATT</div>
      </div>
      <div id="hud-bl">
        <span class="vt sm cc" style="text-shadow:0 0 6px #30ddf088,1px 1px 0 #000">AUTO ▸ AWB</span>
        <span class="vt sm cw glow-w" id="ratio-lbl">3:4</span>
      </div>
      <div id="hud-br">
        <span class="vt sm cg" style="text-shadow:0 0 6px #30d06088,1px 1px 0 #000">▸▸ HI8</span>
      </div>
    </div>

    <div id="no-cam">
      <p class="nc-t">[ NO SIGNAL ]</p>
      <p>カメラへのアクセスが必要です<br>CAMERA ACCESS REQUIRED<br><br>ブラウザの設定でカメラを許可してください</p>
    </div>
  </div>

  <!-- BOTTOM -->
  <div id="bottom-ui">
    <div id="ctrl-row">
      <div id="ratio-stack">
        <button class="rbtn" data-r="9:16" onclick="setRatio('9:16')">9:16</button>
        <button class="rbtn active" data-r="3:4" onclick="setRatio('3:4')">3:4</button>
        <button class="rbtn" data-r="1:1" onclick="setRatio('1:1')">1:1</button>
        <button class="rbtn" data-r="4:3" onclick="setRatio('4:3')">4:3</button>
      </div>
      <div id="shutter-wrap">
        <button id="shutter" onclick="onShutter()"><div id="si"></div></button>
        <span id="sl">SHUTTER</span>
      </div>
      <button id="gal-btn" onclick="openGal()">
        <img id="gal-thumb" alt="">
        <span id="gal-icon">⊞</span>
        <span id="gal-count"></span>
      </button>
    </div>
  </div>
</div>

<!-- Gallery -->
<div id="gal-panel">
  <div id="gal-hdr">
    <span id="gal-title">▶ VHS VAULT</span>
    <button id="gal-close" onclick="closeGal()">CLOSE ✕</button>
  </div>
  <div id="gal-grid"><div id="gal-empty">[ NO MEDIA ]<br>撮影した写真・動画が<br>ここに表示されます</div></div>
</div>

<!-- Lightbox -->
<div id="lb">
  <img id="lb-img" alt="">
  <video id="lb-vid" controls playsinline></video>
  <div id="lb-btns">
    <button class="lbb" onclick="dlM()">↓ SAVE</button>
    <button class="lbb" onclick="delM()">✕ DEL</button>
    <button class="lbb" onclick="closeLB()">← BACK</button>
  </div>
</div>
<div id="flash"></div>

<script>
// ════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════
let stream=null, mode='photo', ratio='3:4';
let isRec=false, mr=null, rChunks=[];
let saved=[], lbIdx=-1;
let tcStart=Date.now(), tcIv=null;
let recStart=null, recIv=null;
let prevData=null;
let tracking=false, trackTimer=null;
let glitchSeed=Math.random();

const sv   = document.getElementById('src-video');
const MC   = document.getElementById('main-canvas');
const cx   = MC.getContext('2d',{willReadFrequently:true});
const recRow= document.getElementById('rec-row');
const recEl = document.getElementById('rec-elapsed');
const tcEl  = document.getElementById('timecode');
const dsEl  = document.getElementById('datestamp');
const battEl= document.getElementById('batt');
const mlbl  = document.getElementById('mode-lbl');
const rlbl  = document.getElementById('ratio-lbl');
const si    = document.getElementById('si');
const sl    = document.getElementById('sl');
const gThumb= document.getElementById('gal-thumb');
const gIcon = document.getElementById('gal-icon');
const gCnt  = document.getElementById('gal-count');
const flash = document.getElementById('flash');
const noCam = document.getElementById('no-cam');
const vf    = document.getElementById('vf');

// ════════════════════════════════════════════════════════════════
// CAMERA
// ════════════════════════════════════════════════════════════════
async function initCam(){
  const opts=[
    {video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:true},
    {video:{facingMode:'environment'},audio:true},
    {video:{facingMode:'environment'}},
    {video:true}
  ];
  for(const o of opts){
    try{ stream=await navigator.mediaDevices.getUserMedia(o); break; }catch{}
  }
  if(!stream){ noCam.style.display='flex'; return; }
  sv.srcObject=stream;
  await sv.play();
  noCam.style.display='none';
  startRender();
  startHUD();
  schedTrack();
}

// ════════════════════════════════════════════════════════════════
// RENDER LOOP
// ════════════════════════════════════════════════════════════════
function startRender(){ requestAnimationFrame(renderFrame); }

function renderFrame(){
  requestAnimationFrame(renderFrame);
  if(!sv.videoWidth||sv.readyState<2) return;

  const W=MC.width=MC.offsetWidth, H=MC.height=MC.offsetHeight;
  if(!W||!H) return;

  // 1. Crop source to ratio
  drawCropped(W,H);

  // 2. Pixel-level VHS processing
  let img=cx.getImageData(0,0,W,H);
  processPixels(img.data,W,H);
  cx.putImageData(img,0,0);

  // 3. Chroma bleed (RGB channel offsets via compositing)
  chromaBleed(W,H);

  // 4. Ghosting / motion smear
  if(prevData) ghosting(W,H);
  prevData=cx.getImageData(0,0,W,H);

  // 5. Tape wobble (per-row horizontal shift)
  tapeWobble(W,H);

  // 6. Interlace field flicker
  interlace(W,H);

  // 7. Tracking glitch
  if(tracking) trackingGlitch(W,H);

  // 8. Burn HUD into canvas (date stamp)
  burnHUD(W,H);
}

function drawCropped(W,H){
  const vw=sv.videoWidth,vh=sv.videoHeight,vAR=vw/vh,tAR=W/H;
  let sw,sh,sx,sy;
  if(vAR>tAR){sh=vh;sw=vh*tAR;sx=(vw-sw)/2;sy=0;}
  else{sw=vw;sh=vw/tAR;sx=0;sy=(vh-sh)/2;}
  cx.drawImage(sv,sx,sy,sw,sh,0,0,W,H);
}

// ════════════════════════════════════════════════════════════════
// PIXEL PROCESSING — the heart of the VHS look
// ════════════════════════════════════════════════════════════════
function processPixels(d,W,H){
  const t=Date.now()*0.001;

  for(let i=0;i<d.length;i+=4){
    let r=d[i],g=d[i+1],b=d[i+2];

    // ── Contrast boost ──
    r=(r-128)*1.18+128; g=(g-128)*1.18+128; b=(b-128)*1.18+128;

    // ── Desaturate (VHS loses chroma resolution) ──
    const lum=r*0.299+g*0.587+b*0.114;
    r=lum+(r-lum)*0.62; g=lum+(g-lum)*0.62; b=lum+(b-lum)*0.62;

    // ── VHS color grade: warm shadows, green midtones, crushed blues ──
    r=r*1.10+12;       // red boost / warm
    g=g*1.05+3;        // slight green
    b=b*0.78-12;       // blue crush

    // ── Luma noise (heavy) ──
    const ln=(Math.random()-0.5)*38;
    r+=ln; g+=ln; b+=ln;

    // ── Chroma noise (color fringing) ──
    r+=(Math.random()-0.5)*22;
    b+=(Math.random()-0.5)*22;

    // ── Horizontal luma banding (tape dropout) ──
    const y=((i/4)/W)|0;
    const band=Math.sin(y*0.4+t*3.1)*Math.sin(y*0.07+t*0.9)*8;
    r+=band; g+=band; b+=band;

    d[i]=cl(r); d[i+1]=cl(g); d[i+2]=cl(b);
  }

  // ── Horizontal chroma smear (per-row right-to-left bleed) ──
  for(let y=0;y<H;y++){
    let pr=0,pg=0,pb=0;
    for(let x=0;x<W;x++){
      const i=(y*W+x)*4;
      pr=pr*0.88+d[i]*0.12;
      pg=pg*0.88+d[i+1]*0.12;
      pb=pb*0.88+d[i+2]*0.12;
      // Only bleed chroma (cb/cr approximation)
      d[i]  =cl(d[i]  *0.82+pr*0.18);
      d[i+2]=cl(d[i+2]*0.82+pb*0.18);
    }
  }
}

// ════════════════════════════════════════════════════════════════
// CHROMA BLEED via canvas compositing
// ════════════════════════════════════════════════════════════════
function chromaBleed(W,H){
  // Grab current
  const snap=cx.getImageData(0,0,W,H);

  // Offscreen for shifted red channel
  const tmp=new OffscreenCanvas(W,H);
  const tc=tmp.getContext('2d');
  const ri=new ImageData(W,H);
  for(let i=0;i<snap.data.length;i+=4){
    ri.data[i]  =snap.data[i];   // R
    ri.data[i+3]=snap.data[i+3]; // A
  }
  tc.putImageData(ri,0,0);

  // Red right shift
  cx.save();
  cx.globalCompositeOperation='screen';
  cx.globalAlpha=0.22;
  cx.drawImage(tmp,5,0);

  // Blue left shift  
  const bi=new ImageData(W,H);
  for(let i=0;i<snap.data.length;i+=4){
    bi.data[i+2]=snap.data[i+2]; bi.data[i+3]=snap.data[i+3];
  }
  tc.putImageData(bi,0,0);
  cx.drawImage(tmp,-3,0);
  cx.restore();
}

// ════════════════════════════════════════════════════════════════
// GHOSTING — previous frame echo
// ════════════════════════════════════════════════════════════════
function ghosting(W,H){
  const tmp=new OffscreenCanvas(W,H);
  tmp.getContext('2d').putImageData(prevData,0,0);
  cx.save();
  cx.globalAlpha=0.22;
  cx.globalCompositeOperation='screen';
  cx.drawImage(tmp,3,0); // shifted right = motion trail
  cx.restore();
}

// ════════════════════════════════════════════════════════════════
// TAPE WOBBLE — sinusoidal row shift
// ════════════════════════════════════════════════════════════════
function tapeWobble(W,H){
  const t=Date.now()*0.001;
  const img=cx.getImageData(0,0,W,H);
  const out=new ImageData(W,H);
  const s=img.data, d=out.data;
  for(let y=0;y<H;y++){
    // Multi-frequency wobble for organic feel
    const w=Math.round(
      Math.sin(y*0.06+t*2.1)*2.2
     +Math.sin(y*0.18+t*0.8)*0.8
     +Math.sin(y*0.9 +t*5.0)*0.3
    );
    for(let x=0;x<W;x++){
      const sx=x-w; if(sx<0||sx>=W) continue;
      const di=(y*W+x)*4, si=(y*W+sx)*4;
      d[di]=s[si]; d[di+1]=s[si+1]; d[di+2]=s[si+2]; d[di+3]=s[si+3];
    }
  }
  cx.putImageData(out,0,0);
}

// ════════════════════════════════════════════════════════════════
// INTERLACE FIELD FLICKER
// ════════════════════════════════════════════════════════════════
function interlace(W,H){
  const img=cx.getImageData(0,0,W,H);
  const d=img.data;
  const field=Math.floor(Date.now()/16.67)%2; // 60i
  for(let y=field;y<H;y+=2){
    for(let x=0;x<W;x++){
      const i=(y*W+x)*4;
      d[i]  =d[i]  *0.78|0;
      d[i+1]=d[i+1]*0.78|0;
      d[i+2]=d[i+2]*0.78|0;
    }
  }
  cx.putImageData(img,0,0);
}

// ════════════════════════════════════════════════════════════════
// TRACKING ERROR — the most VHS thing possible
// ════════════════════════════════════════════════════════════════
function trackingGlitch(W,H){
  const img=cx.getImageData(0,0,W,H);
  const out=new ImageData(new Uint8ClampedArray(img.data),W,H);
  const s=img.data, d=out.data;

  // Several horizontal bands shift sideways
  const bands=3+Math.random()*5|0;
  for(let b=0;b<bands;b++){
    const y0=Math.random()*H|0;
    const bh=4+Math.random()*30|0;
    const shift=(Math.random()-0.5)*W*0.25|0;
    for(let y=y0;y<Math.min(y0+bh,H);y++){
      for(let x=0;x<W;x++){
        const sx=((x-shift)%W+W)%W;
        const di=(y*W+x)*4, si=(y*W+sx)*4;
        d[di]=s[si]; d[di+1]=s[si+1]; d[di+2]=s[si+2];
        if(Math.random()<0.12){ // white/black noise in band
          const v=Math.random()<0.6?0:255;
          d[di]=d[di+1]=d[di+2]=v;
        }
      }
    }
  }

  // Black/white bar at edge (classic tracking roll)
  const barAt=Math.random()<0.5?0:H-(8+Math.random()*25|0);
  const barH=6+Math.random()*20|0;
  for(let y=barAt;y<Math.min(barAt+barH,H);y++){
    for(let x=0;x<W;x++){
      const i=(y*W+x)*4;
      d[i]=d[i+1]=d[i+2]=Math.random()<0.5?0:Math.random()*200|0;
    }
  }

  // Luminance flash stripe
  const fy=Math.random()*H|0, fh=2+Math.random()*4|0;
  for(let y=fy;y<Math.min(fy+fh,H);y++){
    for(let x=0;x<W;x++){
      const i=(y*W+x)*4;
      d[i]=d[i+1]=d[i+2]=cl(d[i]+180);
    }
  }

  cx.putImageData(out,0,0);
}

// ════════════════════════════════════════════════════════════════
// BURN HUD INTO CANVAS (date stamp always on image)
// ════════════════════════════════════════════════════════════════
function burnHUD(W,H){
  const n=new Date();
  const ds=`${p2(n.getMonth()+1)}/${p2(n.getDate())} ${n.getFullYear()}  ${p2(n.getHours())}:${p2(n.getMinutes())}`;
  cx.save();
  cx.font='bold 13px "Courier New"';
  cx.textBaseline='bottom';
  cx.fillStyle='rgba(0,0,0,0.7)';
  cx.fillRect(W-188,H-26,186,22);
  cx.fillStyle='#f0922a';
  cx.shadowColor='#f0922a';
  cx.shadowBlur=10;
  cx.fillText(ds,W-183,H-6);
  cx.restore();

  // Occasional channel flicker
  if(Math.random()<0.025){
    cx.save();
    cx.font='bold 10px "Courier New"';
    cx.fillStyle='rgba(255,255,255,0.6)';
    cx.shadowColor='#fff'; cx.shadowBlur=5;
    cx.fillText('CH 03',10,H-10);
    cx.restore();
  }
}

// ════════════════════════════════════════════════════════════════
// TRACKING SCHEDULE
// ════════════════════════════════════════════════════════════════
function schedTrack(){
  clearTimeout(trackTimer);
  const delay=3000+Math.random()*10000;
  trackTimer=setTimeout(()=>{
    tracking=true;
    setTimeout(()=>{ tracking=false; schedTrack(); }, 60+Math.random()*400);
  },delay);
}

// ════════════════════════════════════════════════════════════════
// HUD TIMECODE
// ════════════════════════════════════════════════════════════════
function startHUD(){
  const n=new Date();
  dsEl.textContent=`${p2(n.getMonth()+1)}/${p2(n.getDate())}/${n.getFullYear()}`;

  tcIv=setInterval(()=>{
    const e=Date.now()-tcStart;
    tcEl.textContent=p2(Math.floor(e/3600000)%24)+':'+p2(Math.floor(e/60000)%60)+':'+p2(Math.floor(e/1000)%60)+':'+p2(Math.floor((e%1000)/33.33)%30);
  },33);

  // Battery flicker
  setInterval(()=>{
    if(Math.random()<0.05){
      battEl.textContent='▮▮▮░ BATT'; battEl.style.color='#ff4444';
      setTimeout(()=>{ battEl.textContent='▮▮▮▮ BATT'; battEl.style.color=''; },200+Math.random()*600);
    }
  },2500);
}

// ════════════════════════════════════════════════════════════════
// MODE / RATIO
// ════════════════════════════════════════════════════════════════
function setMode(m){
  mode=m;
  document.querySelectorAll('.mtab').forEach(b=>b.classList.toggle('active',b.dataset.m===m));
  if(m==='photo'){ sl.textContent='SHUTTER'; mlbl.textContent='■ CAMERA'; si.classList.remove('rmode'); }
  else { sl.textContent=isRec?'■ STOP':'● REC'; mlbl.textContent='▶ VIDEO'; }
}

function setRatio(r){
  ratio=r;
  document.querySelectorAll('.rbtn').forEach(b=>b.classList.toggle('active',b.dataset.r===r));
  rlbl.textContent=r;
}

// ════════════════════════════════════════════════════════════════
// SHUTTER
// ════════════════════════════════════════════════════════════════
function onShutter(){ mode==='photo'?capturePhoto():toggleRec(); }

function capturePhoto(){
  flash.classList.add('on'); setTimeout(()=>flash.classList.remove('on'),70);
  const W=MC.width, H=MC.height;
  const out=new OffscreenCanvas(W,H);
  const oc=out.getContext('2d');
  oc.drawImage(MC,0,0);
  burnPhotoFX(oc,W,H);
  out.convertToBlob({type:'image/jpeg',quality:0.91}).then(blob=>{
    const url=URL.createObjectURL(blob);
    saved.push({type:'photo',url,blob,date:new Date()});
    updateGallery();
  });
}

function burnPhotoFX(ctx,W,H){
  // Extra heavy scanlines on still
  ctx.fillStyle='rgba(0,0,0,0.18)';
  for(let y=0;y<H;y+=2) ctx.fillRect(0,y,W,1);

  // Interlace artifact
  ctx.fillStyle='rgba(0,0,0,0.1)';
  for(let y=1;y<H;y+=4) ctx.fillRect(0,y,W,1);

  // Deep vignette
  const vig=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.8);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(0.6,'rgba(0,0,0,0.2)');
  vig.addColorStop(1,'rgba(0,0,0,0.82)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

  // Random tracking line burned in
  if(Math.random()<0.6){
    const ly=Math.random()*H;
    ctx.fillStyle=`rgba(255,255,255,${0.2+Math.random()*0.4})`;
    ctx.fillRect(0,ly,W,1+Math.random()*3);
  }

  // Additional grain
  const id=ctx.getImageData(0,0,W,H), d=id.data;
  for(let i=0;i<d.length;i+=4){
    const n=(Math.random()-0.5)*40;
    d[i]=cl(d[i]+n); d[i+1]=cl(d[i+1]+n); d[i+2]=cl(d[i+2]+n);
  }
  ctx.putImageData(id,0,0);

  // Burned-in date
  const n=new Date();
  const ds=`${p2(n.getMonth()+1)}/${p2(n.getDate())} ${n.getFullYear()}  ${p2(n.getHours())}:${p2(n.getMinutes())}`;
  ctx.font='bold 14px "Courier New"';
  ctx.textBaseline='bottom';
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(W-195,H-28,193,24);
  ctx.fillStyle='#f0922a'; ctx.shadowColor='#f0922a'; ctx.shadowBlur=10;
  ctx.fillText(ds,W-190,H-7);
}

// ════════════════════════════════════════════════════════════════
// VIDEO RECORDING
// ════════════════════════════════════════════════════════════════
function toggleRec(){ isRec?stopRec():startRec(); }

function startRec(){
  if(!stream)return;
  rChunks=[];
  const types=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm','video/mp4'];
  let mt=''; for(const t of types){ if(MediaRecorder.isTypeSupported(t)){mt=t;break;} }
  try{ mr=new MediaRecorder(stream,mt?{mimeType:mt}:{}); }catch{ mr=new MediaRecorder(stream); }
  mr.ondataavailable=e=>{ if(e.data.size>0)rChunks.push(e.data); };
  mr.onstop=finalizeRec;
  mr.start(100);
  isRec=true; recStart=Date.now();
  recRow.classList.add('on'); recEl.style.display='block';
  si.classList.add('rmode'); sl.textContent='■ STOP';
  recIv=setInterval(()=>{
    const e=Date.now()-recStart;
    recEl.textContent=p2(Math.floor(e/60000))+':'+p2(Math.floor(e/1000)%60);
  },500);
}

function stopRec(){
  if(!mr||mr.state==='inactive')return;
  mr.stop(); isRec=false;
  clearInterval(recIv);
  recRow.classList.remove('on'); recEl.style.display='none'; recEl.textContent='00:00';
  si.classList.remove('rmode'); sl.textContent='● REC';
}

function finalizeRec(){
  const mime=mr.mimeType||'video/webm';
  const blob=new Blob(rChunks,{type:mime});
  const url=URL.createObjectURL(blob);
  saved.push({type:'video',url,blob,date:new Date(),mime});
  updateGallery();
}

// ════════════════════════════════════════════════════════════════
// GALLERY
// ════════════════════════════════════════════════════════════════
function updateGallery(){
  const em=document.getElementById('gal-empty'),gr=document.getElementById('gal-grid');
  if(!saved.length){ em.style.display='block'; gThumb.style.display='none'; gIcon.style.display='block'; gCnt.style.display='none'; return; }
  em.style.display='none'; gCnt.textContent=saved.length; gCnt.style.display='block';
  const last=saved[saved.length-1];
  if(last.type==='photo'){ gThumb.src=last.url; gThumb.style.display='block'; gIcon.style.display='none'; }
  gr.innerHTML='';
  saved.slice().reverse().forEach((r,i)=>{
    const ri=saved.length-1-i;
    const el=document.createElement('div'); el.className='gi'; el.onclick=()=>openLB(ri);
    if(r.type==='photo'){ const img=document.createElement('img'); img.src=r.url; el.appendChild(img); }
    else{ const v=document.createElement('video'); v.src=r.url; v.muted=true; v.playsInline=true; el.appendChild(v); }
    const b=document.createElement('div'); b.className='gbadge';
    b.textContent=r.type==='photo'?'▶ PHT':'▶ VID'; el.appendChild(b);
    gr.appendChild(el);
  });
}

function openGal(){ document.getElementById('gal-panel').classList.add('open'); }
function closeGal(){ document.getElementById('gal-panel').classList.remove('open'); }

function openLB(idx){
  lbIdx=idx; const r=saved[idx];
  const lbEl=document.getElementById('lb');
  const li=document.getElementById('lb-img'),lv=document.getElementById('lb-vid');
  li.style.display='none'; lv.style.display='none';
  if(r.type==='photo'){ li.src=r.url; li.style.display='block'; }
  else{ lv.src=r.url; lv.style.display='block'; }
  lbEl.classList.add('open');
}
function closeLB(){ document.getElementById('lb').classList.remove('open'); document.getElementById('lb-vid').pause(); }
function dlM(){ if(lbIdx<0)return; const r=saved[lbIdx]; const a=document.createElement('a'); a.href=r.url; a.download=r.type==='photo'?`vhs_${Date.now()}.jpg`:`vhs_${Date.now()}.webm`; a.click(); }
function delM(){ if(lbIdx<0)return; saved.splice(lbIdx,1); closeLB(); updateGallery(); }

// ════════════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════════════
function cl(v){ return v<0?0:v>255?255:v|0; }
function p2(n){ return String(n).padStart(2,'0'); }

// ════════════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════════════
initCam();
updateGallery();
</script>
