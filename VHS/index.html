<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VHS Camera FULL</title>

<script src="https://unpkg.com/dexie/dist/dexie.js"></script>

<style>
body {
    margin:0;
    background:#050510;
    color:white;
    font-family:'Courier New', monospace;
    overflow:hidden;
}

/* モード */
.mode-selector {
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:20px;
    font-size:1.2rem;
}
.mode { color:#888; cursor:pointer; }
.mode.active { color:#ffcc00; transform:scale(1.2); }

/* カメラ */
#camera-container {
    position:relative;
    width:100%;
    height:65vh;
    background:black;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
}

canvas {
    position:absolute;
    top:0;
    left:0;
    image-rendering: pixelated;
}
video {
    width:100%;
    height:100%;
    object-fit:cover;
}


/* VHSライン */
#camera-container::before {
    content:"";
    position:absolute;
    width:100%;height:100%;
    background:repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.2) 3px
    );
    pointer-events:none;
}

/* REC */
.rec {
    position:absolute;
    top:10px;
    right:10px;
    color:red;
    font-weight:bold;
}

/* シャッター */
.shutter {
    width:80px;height:80px;
    background:white;
    border-radius:50%;
    margin:20px auto;
}

/* ギャラリー */
#gallery {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:#000;
    display:none;
    flex-direction:column;
}
.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:5px;
}

/* 動画サムネ */
.thumb { position:relative; }
.play {
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    font-size:28px;
}
.time {
    position:absolute;
    bottom:5px;
    right:5px;
    background:rgba(0,0,0,0.7);
    padding:2px 6px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="mode-selector">
    <span class="mode active" onclick="setMode('photo')">写真</span>
    <span class="mode" onclick="setMode('video')">ビデオ</span>
</div>

<div id="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="effect-canvas"></canvas>
    <div class="rec" id="rec" style="display:none;">● REC</div>
</div>

<div class="shutter" onclick="handleShutter()"></div>
<button onclick="openGallery()">アルバム</button>

<div id="gallery">
    <button onclick="closeGallery()">閉じる</button>
    <div class="grid" id="grid"></div>
</div>

<script>
// ===== DB =====
const db = new Dexie("VHSCamDB");
db.version(1).stores({
    photos: '++id, blob, timestamp, type, duration'
});

// ===== DOM =====
const video = document.getElementById('video');
const canvas = document.getElementById('effect-canvas');
const ctx = canvas.getContext('2d');
const recUI = document.getElementById('rec');

// ===== モード =====
let currentMode = "photo";
let isRecording = false;
let mediaRecorder;
let chunks = [];
let startTime = 0;

// ===== カメラ =====
navigator.mediaDevices.getUserMedia({
    video:true,
    audio:true
})
.then(stream=>{
    video.srcObject = stream;
    video.onloadedmetadata = ()=>loop();
});

// ===== VHSエフェクト =====
function loop(){
    const vw = video.videoWidth;
    const vh = video.videoHeight;

    if (!vw || !vh) {
        requestAnimationFrame(loop);
        return;
    }

    // 比率（今はAUTO＝9:16）
    let targetRatio = 9/16;

    let sx = 0, sy = 0, sw = vw, sh = vh;

    if (vw / vh > targetRatio) {
        // 横カット
        sw = vh * targetRatio;
        sx = (vw - sw) / 2;
    } else {
        // 縦カット
        sh = vw / targetRatio;
        sy = (vh - sh) / 2;
    }

    // canvasサイズをトリミングに合わせる
    canvas.width = sw;
    canvas.height = sh;

    // 描画（超重要）
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

    // ノイズ
    let img = ctx.getImageData(0,0,sw,sh);
    let d = img.data;

    for(let i=0;i<d.length;i+=4){
        let n = (Math.random()-0.5)*40;
        d[i]+=n;
        d[i+1]+=n;
        d[i+2]+=n;
    }

    ctx.putImageData(img,0,0);

    requestAnimationFrame(loop);
}

// ===== モード切替 =====
function setMode(mode){
    currentMode = mode;
    document.querySelectorAll('.mode').forEach((e,i)=>{
        e.classList.toggle('active',
            (mode==="photo" && i===0) ||
            (mode==="video" && i===1)
        );
    });
}

// ===== スワイプ =====
let startX = 0;

document.body.addEventListener("touchstart",e=>{
    startX = e.touches[0].clientX;
});
document.body.addEventListener("touchend",e=>{
    let dx = e.changedTouches[0].clientX - startX;
    if(dx > 50) setMode("photo");
    if(dx < -50) setMode("video");
});

// ===== シャッター =====
function handleShutter(){
    if(currentMode==="photo"){
        capture();
    }else{
        toggleRecording();
    }
}

// ===== 写真 =====
async function capture(){
    canvas.toBlob(async blob=>{
        await db.photos.add({
            blob,
            timestamp: Date.now(),
            type:"photo"
        });
    },"image/jpeg",0.7);
}

// ===== 動画 =====
function toggleRecording(){
    if(!isRecording){
        startRecording();
    }else{
        stopRecording();
    }
    isRecording = !isRecording;
}
function startRecording(){
    const canvasStream = canvas.captureStream(30);

    // 🔥 音声追加
    const audioTracks = video.srcObject.getAudioTracks();
    audioTracks.forEach(track => canvasStream.addTrack(track));

    mediaRecorder = new MediaRecorder(canvasStream);

    chunks = [];
    startTime = Date.now();

    mediaRecorder.ondataavailable = e=>{
        if(e.data.size>0) chunks.push(e.data);
    };

    mediaRecorder.onstop = async ()=>{
        const blob = new Blob(chunks,{type:"video/webm"});
        const duration = (Date.now()-startTime)/1000;

        await db.photos.add({
            blob,
            timestamp: Date.now(),
            type:"video",
            duration
        });
    };

    mediaRecorder.start();
    recUI.style.display = "block";
}

function stopRecording(){
    mediaRecorder.stop();
    recUI.style.display = "none";
}

// ===== ギャラリー =====
async function openGallery(){
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    const all = await db.photos.orderBy('id').reverse().toArray();

    all.forEach(p=>{
        const url = URL.createObjectURL(p.blob);

        if(p.type==="photo"){
            const img = document.createElement('img');
            img.src = url;
            grid.appendChild(img);
        }else{
            const wrap = document.createElement('div');
            wrap.className = "thumb";

            const vid = document.createElement('video');
            vid.src = url;
            vid.muted = true;

            const play = document.createElement('div');
            play.className = "play";
            play.innerText = "▶";

            const time = document.createElement('div');
            time.className = "time";
            time.innerText = formatTime(p.duration);

            wrap.appendChild(vid);
            wrap.appendChild(play);
            wrap.appendChild(time);

            wrap.onclick = ()=>vid.play();

            grid.appendChild(wrap);
        }
    });

    document.getElementById('gallery').style.display="flex";
}

function closeGallery(){
    document.getElementById('gallery').style.display="none";
}

function formatTime(t){
    const m = Math.floor(t/60);
    const s = Math.floor(t%60);
    return `${m}:${String(s).padStart(2,"0")}`;
}
</script>

</body>
</html>
