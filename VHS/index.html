<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VHS CAM</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    background: #000;
    color: #fff;
    font-family: 'Courier New', monospace;
    height: 100dvh;
    overflow: hidden;
    user-select: none;
  }

  #app {
    position: relative;
    width: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: #000;
  }

  /* ── VIEWFINDER ── */
  #viewfinder {
    position: relative;
    flex: 1;
    overflow: hidden;
    background: #000;
  }

  #cam-video, #cam-canvas {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100%; height: 100%;
    object-fit: cover;
  }

  #cam-canvas { pointer-events: none; }

  /* VHS overlay effects */
  #vhs-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  /* Scanlines */
  #vhs-overlay::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    animation: scanroll 8s linear infinite;
  }

  @keyframes scanroll {
    0% { background-position: 0 0; }
    100% { background-position: 0 100px; }
  }

  /* VHS noise / static */
  #noise-canvas {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    opacity: 0.04;
    pointer-events: none;
    z-index: 11;
  }

  /* Vignette */
  #vhs-overlay::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
  }

  /* HUD elements */
  #hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 20;
    padding: 12px 14px;
  }

  #hud-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  #hud-bottom {
    position: absolute;
    bottom: 12px;
    left: 14px;
    right: 14px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .hud-label {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 0.05em;
    text-shadow: 1px 1px 0 #000;
  }

  .hud-white { color: #fff; }
  .hud-yellow { color: #f0c040; }
  .hud-red { color: #f03030; }
  .hud-cyan { color: #40d0e0; }

  #rec-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #rec-indicator.active { opacity: 1; animation: recblink 1s step-end infinite; }

  @keyframes recblink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  #rec-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #f03030;
  }

  #timecode {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    font-weight: bold;
    color: #f0c040;
    letter-spacing: 0.1em;
    text-shadow: 1px 1px 0 #000, 0 0 6px rgba(240,192,64,0.5);
  }

  #date-stamp {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #f0a040;
    text-shadow: 1px 1px 0 #000;
    text-align: right;
  }

  #tape-counter {
    font-size: 11px;
    color: #fff;
    text-shadow: 1px 1px 0 #000;
  }

  /* Camera label */
  #cam-label {
    position: absolute;
    top: 50%;
    right: 10px;
    transform: translateY(-50%);
    writing-mode: vertical-rl;
    font-family: 'Courier New', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.15em;
  }

  /* Glitch / tracking error effect */
  .glitch-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: rgba(255,255,255,0.6);
    pointer-events: none;
    z-index: 15;
    animation: glitchmove 0.1s linear forwards;
  }
  @keyframes glitchmove {
    from { transform: translateX(-5px); opacity: 1; }
    to { transform: translateX(5px); opacity: 0; }
  }

  /* ── MODE SELECTOR (top) ── */
  #mode-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 30;
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 10px 0 6px;
    pointer-events: all;
  }

  .mode-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.55);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 0.12em;
    cursor: pointer;
    padding: 2px 6px;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .mode-btn.active {
    color: #fff;
    border-bottom: 2px solid #f0c040;
  }

  /* ── BOTTOM CONTROLS ── */
  #controls {
    background: linear-gradient(to bottom, #111 0%, #0a0a0a 100%);
    border-top: 1px solid #222;
    padding: 14px 24px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  /* Aspect ratio selector */
  #ratio-selector {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
    min-width: 44px;
  }

  .ratio-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    color: rgba(255,255,255,0.5);
    font-family: 'Courier New', monospace;
    font-size: 9px;
    font-weight: bold;
    padding: 3px 5px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    width: 36px;
    text-align: center;
  }

  .ratio-btn.active {
    background: #f0c040;
    border-color: #f0c040;
    color: #000;
  }

  /* Shutter button */
  #shutter-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  #shutter {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 3px solid #fff;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s;
    position: relative;
  }

  #shutter:active { transform: scale(0.92); }

  #shutter-inner {
    width: 58px; height: 58px;
    border-radius: 50%;
    background: #fff;
    transition: background 0.2s, border-radius 0.2s;
  }

  #shutter-inner.recording {
    background: #f03030;
    border-radius: 10px;
    width: 28px; height: 28px;
  }

  #shutter-label {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.1em;
  }

  /* Gallery button */
  #gallery-btn {
    width: 56px; height: 56px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.3);
    overflow: hidden;
    cursor: pointer;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
  }

  #gallery-preview {
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
  }

  #gallery-icon {
    color: rgba(255,255,255,0.4);
    font-size: 22px;
  }

  #gallery-count {
    position: absolute;
    top: 2px; right: 2px;
    background: #f0c040;
    color: #000;
    font-size: 8px;
    font-weight: bold;
    font-family: 'Courier New', monospace;
    border-radius: 3px;
    padding: 1px 3px;
    display: none;
  }

  /* ── GALLERY PANEL ── */
  #gallery-panel {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 100;
    display: none;
    flex-direction: column;
  }

  #gallery-panel.open { display: flex; }

  #gallery-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid #222;
  }

  #gallery-title {
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 0.15em;
    color: #f0c040;
  }

  #gallery-close {
    background: none;
    border: 1px solid #333;
    border-radius: 6px;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 0.1em;
  }

  #gallery-grid {
    flex: 1;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    padding: 2px;
  }

  .gallery-item {
    aspect-ratio: 1;
    overflow: hidden;
    cursor: pointer;
    background: #111;
    position: relative;
  }

  .gallery-item img, .gallery-item video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .gallery-item-type {
    position: absolute;
    bottom: 4px; left: 4px;
    font-size: 9px;
    font-family: 'Courier New', monospace;
    background: rgba(0,0,0,0.7);
    color: #f0c040;
    padding: 1px 4px;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }

  #gallery-empty {
    color: rgba(255,255,255,0.3);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    text-align: center;
    padding: 60px 20px;
    letter-spacing: 0.1em;
  }

  /* ── LIGHTBOX ── */
  #lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 200;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #lightbox.open { display: flex; }

  #lightbox-media {
    max-width: 100%;
    max-height: 80dvh;
    object-fit: contain;
  }

  #lightbox-controls {
    display: flex;
    gap: 16px;
    margin-top: 20px;
  }

  .lb-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid #333;
    border-radius: 6px;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 6px 14px;
    cursor: pointer;
    letter-spacing: 0.1em;
  }

  /* Flash overlay */
  #flash {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 50;
    transition: opacity 0.05s;
  }

  #flash.flash-on { opacity: 0.85; }

  /* Error / permission message */
  #cam-error {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    text-align: center;
    padding: 40px;
    z-index: 5;
    background: #0a0a0a;
  }

  #cam-error p {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    line-height: 1.6;
    letter-spacing: 0.05em;
  }

  #cam-error .err-title {
    font-size: 15px;
    color: #f0c040;
    font-weight: bold;
    letter-spacing: 0.15em;
  }

  /* Recording timer */
  #rec-time {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: #f03030;
    font-weight: bold;
    letter-spacing: 0.1em;
    text-shadow: 0 0 8px rgba(240,48,48,0.7);
    display: none;
  }

  /* ── EFFECT intensity slider ── */
  #effect-panel {
    position: absolute;
    left: 0; right: 0;
    bottom: 0;
    pointer-events: none;
    z-index: 22;
    padding: 0 14px 10px;
    display: flex;
    justify-content: flex-end;
    gap: 6px;
    align-items: flex-end;
  }

</style>
</head>
<body>
<div id="app">

  <!-- Main viewfinder area -->
  <div id="viewfinder">
    <video id="cam-video" autoplay playsinline muted></video>
    <canvas id="cam-canvas"></canvas>
    <canvas id="noise-canvas"></canvas>

    <!-- VHS overlay (scanlines + vignette via CSS) -->
    <div id="vhs-overlay"></div>

    <!-- HUD -->
    <div id="hud">
      <div id="hud-top">
        <div style="display:flex;flex-direction:column;gap:5px;">
          <div id="rec-indicator">
            <div id="rec-dot"></div>
            <span class="hud-label hud-red">REC</span>
          </div>
          <span id="rec-time"></span>
          <span id="tape-counter" class="hud-label hud-white">SP ◼ T-120</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <div id="timecode">00:00:00:00</div>
          <div id="date-stamp"></div>
        </div>
      </div>
      <div id="hud-bottom">
        <span class="hud-label hud-cyan" id="bat-indicator">▮▮▮▮ BATT</span>
        <span class="hud-label hud-white" id="ratio-display">4:3</span>
      </div>
    </div>

    <div id="cam-label">VIDEOCAM · VX1000</div>
    <div id="effect-panel"></div>

    <!-- Mode selector -->
    <div id="mode-bar">
      <button class="mode-btn active" data-mode="photo" onclick="setMode('photo')">PHOTO</button>
      <button class="mode-btn" data-mode="video" onclick="setMode('video')">VIDEO</button>
    </div>

    <!-- Camera error -->
    <div id="cam-error">
      <p class="err-title">[ NO SIGNAL ]</p>
      <p>カメラへのアクセスが必要です。<br>ブラウザの設定でカメラを許可してください。</p>
      <p style="color:rgba(255,255,255,0.3);font-size:11px;">CAMERA ACCESS REQUIRED</p>
    </div>
  </div>

  <!-- Bottom controls -->
  <div id="controls">
    <!-- Aspect ratio -->
    <div id="ratio-selector">
      <button class="ratio-btn" data-ratio="9:16" onclick="setRatio('9:16')">9:16</button>
      <button class="ratio-btn active" data-ratio="3:4" onclick="setRatio('3:4')">3:4</button>
      <button class="ratio-btn" data-ratio="1:1" onclick="setRatio('1:1')">1:1</button>
      <button class="ratio-btn" data-ratio="4:3" onclick="setRatio('4:3')">4:3</button>
    </div>

    <!-- Shutter -->
    <div id="shutter-wrap">
      <button id="shutter" onclick="handleShutter()">
        <div id="shutter-inner"></div>
      </button>
      <span id="shutter-label">SHUTTER</span>
    </div>

    <!-- Gallery -->
    <button id="gallery-btn" onclick="openGallery()">
      <img id="gallery-preview" alt="preview">
      <span id="gallery-icon">⊞</span>
      <span id="gallery-count"></span>
    </button>
  </div>
</div>

<!-- Gallery panel -->
<div id="gallery-panel">
  <div id="gallery-header">
    <span id="gallery-title">▶ VHS VAULT</span>
    <button id="gallery-close" onclick="closeGallery()">CLOSE</button>
  </div>
  <div id="gallery-grid">
    <div id="gallery-empty">[ NO MEDIA RECORDED ]<br><br>撮影した写真・動画がここに表示されます</div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <img id="lightbox-img" class="lightbox-media" style="max-width:100%;max-height:75dvh;object-fit:contain;display:none;">
  <video id="lightbox-vid" class="lightbox-media" style="max-width:100%;max-height:75dvh;object-fit:contain;display:none;" controls></video>
  <div id="lightbox-controls">
    <button class="lb-btn" onclick="downloadMedia()">↓ SAVE</button>
    <button class="lb-btn" onclick="deleteMedia()">✕ DEL</button>
    <button class="lb-btn" onclick="closeLightbox()">← BACK</button>
  </div>
</div>

<!-- Flash -->
<div id="flash"></div>

<script>
// ── State ──
let stream = null;
let mediaRecorder = null;
let recordedChunks = [];
let mode = 'photo';
let currentRatio = '3:4';
let isRecording = false;
let recordings = []; // {type, url, blob, date}
let recStartTime = null;
let recInterval = null;
let timecodeInterval = null;
let timecodeStart = Date.now();
let currentLightboxIndex = -1;
let noiseCtx = null;
let vhsCtx = null;
let animFrame = null;
let glitchTimeout = null;

// ── Elements ──
const video = document.getElementById('cam-video');
const canvas = document.getElementById('cam-canvas');
const noiseCanvas = document.getElementById('noise-canvas');
const recIndicator = document.getElementById('rec-indicator');
const recTime = document.getElementById('rec-time');
const timecodeEl = document.getElementById('timecode');
const dateStamp = document.getElementById('date-stamp');
const ratioDisplay = document.getElementById('ratio-display');
const galleryGrid = document.getElementById('gallery-grid');
const galleryPreview = document.getElementById('gallery-preview');
const galleryIcon = document.getElementById('gallery-icon');
const galleryCount = document.getElementById('gallery-count');
const shutterInner = document.getElementById('shutter-inner');
const shutterLabel = document.getElementById('shutter-label');
const flash = document.getElementById('flash');
const camError = document.getElementById('cam-error');
const viewfinder = document.getElementById('viewfinder');

// ── Init camera ──
async function initCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: true
    });
    video.srcObject = stream;
    await video.play();
    camError.style.display = 'none';
    startVHSRender();
    startNoise();
    startTimecode();
    startGlitch();
  } catch (e) {
    // Try without audio
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      video.srcObject = stream;
      await video.play();
      camError.style.display = 'none';
      startVHSRender();
      startNoise();
      startTimecode();
      startGlitch();
    } catch (e2) {
      camError.style.display = 'flex';
    }
  }
}

// ── VHS render on canvas ──
function startVHSRender() {
  vhsCtx = canvas.getContext('2d');
  renderVHS();
}

function renderVHS() {
  if (!vhsCtx || !video.videoWidth) { animFrame = requestAnimationFrame(renderVHS); return; }

  const W = canvas.width = viewfinder.clientWidth;
  const H = canvas.height = viewfinder.clientHeight;

  // Compute crop for aspect ratio
  const { sw, sh, sx, sy } = getCropParams(video.videoWidth, video.videoHeight, W, H);

  vhsCtx.clearRect(0, 0, W, H);
  vhsCtx.drawImage(video, sx, sy, sw, sh, 0, 0, W, H);

  // Color shift (VHS chroma)
  applyVHSEffect(vhsCtx, W, H);

  animFrame = requestAnimationFrame(renderVHS);
}

function getCropParams(vw, vh, tw, th) {
  const vAR = vw / vh;
  const tAR = tw / th;
  let sw, sh, sx, sy;
  if (vAR > tAR) {
    sh = vh; sw = vh * tAR;
    sx = (vw - sw) / 2; sy = 0;
  } else {
    sw = vw; sh = vw / tAR;
    sx = 0; sy = (vh - sh) / 2;
  }
  return { sw, sh, sx, sy };
}

function applyVHSEffect(ctx, W, H) {
  const imgData = ctx.getImageData(0, 0, W, H);
  const d = imgData.data;

  // Color bleed + desaturate slightly
  for (let i = 0; i < d.length; i += 4) {
    // Slight green boost + reduce saturation for VHS look
    const r = d[i], g = d[i+1], b = d[i+2];
    const gray = r * 0.299 + g * 0.587 + b * 0.114;
    d[i]   = r * 0.85 + gray * 0.15 + 5;
    d[i+1] = g * 0.88 + gray * 0.12;
    d[i+2] = b * 0.75 + gray * 0.25 - 8;
    // Clamp
    if (d[i] > 255) d[i] = 255;
    if (d[i+2] < 0) d[i+2] = 0;
  }

  // Horizontal color bleed (red channel shift)
  const shift = 3;
  for (let y = 0; y < H; y++) {
    for (let x = shift; x < W; x++) {
      const idx = (y * W + x) * 4;
      const sIdx = (y * W + (x - shift)) * 4;
      d[idx] = d[sIdx]; // red channel shifted
    }
  }

  ctx.putImageData(imgData, 0, 0);
}

// ── Noise canvas ──
function startNoise() {
  noiseCanvas.width = 160;
  noiseCanvas.height = 120;
  noiseCtx = noiseCanvas.getContext('2d');
  drawNoise();
}

function drawNoise() {
  if (!noiseCtx) return;
  const id = noiseCtx.createImageData(160, 120);
  const d = id.data;
  for (let i = 0; i < d.length; i += 4) {
    const v = Math.random() * 255 | 0;
    d[i] = d[i+1] = d[i+2] = v;
    d[i+3] = 255;
  }
  noiseCtx.putImageData(id, 0, 0);
  setTimeout(drawNoise, 50);
}

// ── Timecode ──
function startTimecode() {
  // Date stamp
  const now = new Date();
  const mo = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const y = now.getFullYear();
  dateStamp.textContent = `${mo}/${d}/${y}`;

  timecodeInterval = setInterval(() => {
    const elapsed = Date.now() - timecodeStart;
    const h = Math.floor(elapsed / 3600000) % 24;
    const m = Math.floor(elapsed / 60000) % 60;
    const s = Math.floor(elapsed / 1000) % 60;
    const f = Math.floor((elapsed % 1000) / 33.33) % 30;
    timecodeEl.textContent =
      String(h).padStart(2,'0') + ':' +
      String(m).padStart(2,'0') + ':' +
      String(s).padStart(2,'0') + ':' +
      String(f).padStart(2,'0');
  }, 33);
}

// ── Glitch effect ──
function startGlitch() {
  function spawnGlitch() {
    const delay = 2000 + Math.random() * 6000;
    glitchTimeout = setTimeout(() => {
      const line = document.createElement('div');
      line.className = 'glitch-line';
      line.style.top = (Math.random() * 80 + 10) + '%';
      line.style.opacity = '0.4';
      line.style.height = (Math.random() * 4 + 1) + 'px';
      viewfinder.appendChild(line);
      setTimeout(() => line.remove(), 150);
      spawnGlitch();
    }, delay);
  }
  spawnGlitch();
}

// ── Aspect ratio ──
function setRatio(r) {
  currentRatio = r;
  document.querySelectorAll('.ratio-btn').forEach(b => b.classList.toggle('active', b.dataset.ratio === r));
  ratioDisplay.textContent = r;

  // Adjust viewfinder aspect
  const parts = r.split(':').map(Number);
  const ar = parts[0] / parts[1];
  const appEl = document.getElementById('app');

  // Let CSS handle it — just update viewfinder max constraints
  viewfinder.style.aspectRatio = r.replace(':', '/');

  // Resize canvas on next frame
  setTimeout(() => {
    if (canvas) { canvas.width = viewfinder.clientWidth; canvas.height = viewfinder.clientHeight; }
  }, 100);
}

// ── Mode ──
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  if (m === 'photo') {
    shutterLabel.textContent = 'SHUTTER';
    shutterInner.classList.remove('recording');
  } else {
    shutterLabel.textContent = isRecording ? 'STOP' : 'REC';
  }
}

// ── Shutter ──
function handleShutter() {
  if (mode === 'photo') takePhoto();
  else toggleRecording();
}

// ── Take photo ──
function takePhoto() {
  // Flash
  flash.classList.add('flash-on');
  setTimeout(() => flash.classList.remove('flash-on'), 80);

  // Capture from canvas
  const out = document.createElement('canvas');
  const parts = currentRatio.split(':').map(Number);
  const ar = parts[0] / parts[1];
  const W = canvas.width;
  const H = canvas.height;
  out.width = W;
  out.height = H;
  const ctx2 = out.getContext('2d');
  ctx2.drawImage(canvas, 0, 0);
  addHUDToCapture(ctx2, W, H);

  out.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const now = new Date();
    recordings.push({ type: 'photo', url, blob, date: now });
    updateGallery();
  }, 'image/jpeg', 0.92);
}

function addHUDToCapture(ctx, W, H) {
  ctx.font = 'bold 14px Courier New';

  // Date stamp bottom-right
  const now = new Date();
  const mo = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const y = now.getFullYear();
  const hrs = String(now.getHours()).padStart(2,'0');
  const min = String(now.getMinutes()).padStart(2,'0');
  const dateStr = `${mo}/${d}/${y}  ${hrs}:${min}`;

  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(W - 180, H - 36, 175, 26);
  ctx.fillStyle = '#f0a040';
  ctx.fillText(dateStr, W - 174, H - 16);

  // Scanlines overlay (subtle)
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  for (let y2 = 0; y2 < H; y2 += 4) ctx.fillRect(0, y2, W, 2);

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.8);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

// ── Video recording ──
function toggleRecording() {
  if (!isRecording) startRecording();
  else stopRecording();
}

function startRecording() {
  if (!stream) return;
  recordedChunks = [];

  const opts = { mimeType: '' };
  const types = ['video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm', 'video/mp4'];
  for (const t of types) {
    if (MediaRecorder.isTypeSupported(t)) { opts.mimeType = t; break; }
  }

  try {
    mediaRecorder = new MediaRecorder(stream, opts.mimeType ? opts : {});
  } catch(e) {
    mediaRecorder = new MediaRecorder(stream);
  }

  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = finalizeVideo;
  mediaRecorder.start(100);

  isRecording = true;
  recStartTime = Date.now();
  recIndicator.classList.add('active');
  recTime.style.display = 'block';
  shutterInner.classList.add('recording');
  shutterLabel.textContent = 'STOP';

  recInterval = setInterval(() => {
    const elapsed = Date.now() - recStartTime;
    const m = Math.floor(elapsed / 60000);
    const s = Math.floor((elapsed % 60000) / 1000);
    recTime.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }, 500);
}

function stopRecording() {
  if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
  mediaRecorder.stop();
  isRecording = false;
  clearInterval(recInterval);
  recIndicator.classList.remove('active');
  recTime.style.display = 'none';
  recTime.textContent = '00:00';
  shutterInner.classList.remove('recording');
  shutterLabel.textContent = 'REC';
}

function finalizeVideo() {
  const mime = mediaRecorder.mimeType || 'video/webm';
  const blob = new Blob(recordedChunks, { type: mime });
  const url = URL.createObjectURL(blob);
  recordings.push({ type: 'video', url, blob, date: new Date(), mime });
  updateGallery();
}

// ── Gallery ──
function updateGallery() {
  const empty = document.getElementById('gallery-empty');
  if (recordings.length === 0) {
    empty.style.display = 'block';
    galleryPreview.style.display = 'none';
    galleryIcon.style.display = 'block';
    galleryCount.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  galleryCount.textContent = recordings.length;
  galleryCount.style.display = 'block';

  // Update preview thumbnail
  const last = recordings[recordings.length - 1];
  if (last.type === 'photo') {
    galleryPreview.src = last.url;
    galleryPreview.style.display = 'block';
    galleryIcon.style.display = 'none';
  }

  // Rebuild grid
  galleryGrid.innerHTML = '';
  recordings.slice().reverse().forEach((rec, i) => {
    const realIdx = recordings.length - 1 - i;
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.onclick = () => openLightbox(realIdx);

    if (rec.type === 'photo') {
      const img = document.createElement('img');
      img.src = rec.url;
      item.appendChild(img);
    } else {
      const vid = document.createElement('video');
      vid.src = rec.url;
      vid.muted = true;
      vid.playsInline = true;
      item.appendChild(vid);
    }

    const badge = document.createElement('div');
    badge.className = 'gallery-item-type';
    badge.textContent = rec.type === 'photo' ? '▶ PHT' : '▶ VID';
    item.appendChild(badge);
    galleryGrid.appendChild(item);
  });
}

function openGallery() {
  document.getElementById('gallery-panel').classList.add('open');
}

function closeGallery() {
  document.getElementById('gallery-panel').classList.remove('open');
}

// ── Lightbox ──
function openLightbox(idx) {
  currentLightboxIndex = idx;
  const rec = recordings[idx];
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');
  const lbVid = document.getElementById('lightbox-vid');

  lbImg.style.display = 'none';
  lbVid.style.display = 'none';

  if (rec.type === 'photo') {
    lbImg.src = rec.url;
    lbImg.style.display = 'block';
  } else {
    lbVid.src = rec.url;
    lbVid.style.display = 'block';
    lbVid.controls = true;
  }
  lb.classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-vid').pause();
}

function downloadMedia() {
  if (currentLightboxIndex < 0) return;
  const rec = recordings[currentLightboxIndex];
  const a = document.createElement('a');
  a.href = rec.url;
  a.download = rec.type === 'photo'
    ? `vhs_${Date.now()}.jpg`
    : `vhs_${Date.now()}.webm`;
  a.click();
}

function deleteMedia() {
  if (currentLightboxIndex < 0) return;
  recordings.splice(currentLightboxIndex, 1);
  closeLightbox();
  updateGallery();
}

initCamera();
updateGallery();
