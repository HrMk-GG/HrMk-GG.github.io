<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VHS Camera -ガチレトロ-</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="image.png">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        :root { --bg-color: #050510; --accent-yellow: #ffcc00; }
        body { background-color: var(--bg-color); color: white; font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; user-select: none; }

        .mode-selector { margin-top: 30px; display: flex; gap: 20px; font-size: 1.2rem; font-weight: bold; z-index: 10; }
        .mode { color: #888; transition: 0.3s; }
        .mode.active { color: var(--accent-yellow); transform: scale(1.1); }

        /* カメラコンテナ：ここがVHS化の核！ */
        #camera-container {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            position: relative;
            overflow: hidden;
            border: 2px solid white;
            /* 映像をわざとぼかして、ドットを荒く見せる */
            filter: contrast(1.3) brightness(1.1) saturate(1.8) blur(0.7px) sepia(0.3);
        }

        /* 走査線（横線）と色の滲みのオーバーレイ */
        #camera-container::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.1), rgba(0, 255, 0, 0.05), rgba(0, 0, 255, 0.1));
            background-size: 100% 3px, 3px 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* ザラザラしたノイズ（砂嵐）のアニメーション */
        #camera-container::after {
            content: " ";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Static_noise.gif');
            opacity: 0.12; /* ノイズを強めに */
            animation: noise 0.5s steps(10) infinite;
            z-index: 3;
            pointer-events: none;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }

        /* 日付とロゴ（フォントをレトロに） */
        .vhs-overlay {
            position: absolute;
            color: var(--accent-yellow);
            font-family: 'Courier New', Courier, monospace;
            z-index: 10;
            text-shadow: 3px 3px #000;
            pointer-events: none;
            text-transform: uppercase;
        }

        .bottom-ui { position: absolute; bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .controls-row { display: flex; align-items: center; justify-content: center; width: 100vw; gap: 30px; }

        .ratio-btn { font-size: 1.8rem; font-weight: 900; background: none; border: none; color: white; cursor: pointer; width: 80px; font-family: sans-serif; }
        .shutter-btn { width: 80px; height: 80px; background: white; border-radius: 50%; border: 6px solid rgba(255,255,255,0.3); position: relative; cursor: pointer; }
        .shutter-btn::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; border: 2px solid #000; border-radius: 50%; }
        .gallery-thumb { width: 60px; height: 60px; border: 2px solid white; border-radius: 8px; overflow: hidden; background: #222; background-size: cover; background-position: center; cursor: pointer; }

        /* ギャラリー一覧 */
        #gallery-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: none; flex-direction: column; z-index: 100; }
        .gallery-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 5px; overflow-y: auto; }
        .gallery-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; }

        /* 比率設定 */
        .ratio-auto { aspect-ratio: 9 / 16; width: auto; height: 55vh; }
        @media (orientation: landscape) { .ratio-auto { aspect-ratio: 16 / 9; width: 80vw; height: auto; } }
        .ratio-3-4 { aspect-ratio: 3 / 4; width: 85vw; }
        .ratio-1-1 { aspect-ratio: 1 / 1; width: 100vw; }

        /* ノイズのアニメーション */
        @keyframes noise {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -5%); }
            20% { transform: translate(-10%, 5%); }
            30% { transform: translate(5%, -10%); }
            40% { transform: translate(-5%, 15%); }
            50% { transform: translate(-10%, -5%); }
            60% { transform: translate(15%, 0); }
            70% { transform: translate(0, 10%); }
            80% { transform: translate(-15%, 0); }
            90% { transform: translate(10%, 5%); }
            100% { transform: translate(5%, 0); }
        }
    </style>
</head>
<body>

    <div class="mode-selector">
        <span class="mode active">写真</span>
        <span style="color:var(--accent-yellow)">●</span>
        <span class="mode">ビデオ</span>
    </div>

    <div id="camera-container" class="ratio-auto">
        <video id="webcam" autoplay playsinline muted></video>
        <div class="vhs-overlay" style="top: 15px; left: 15px; font-weight: bold; font-size: 1.2rem; line-height: 1;">
            VHS CAMERA<br>PLAY ▶
        </div>
        <div class="vhs-overlay" id="vhs-date" style="bottom: 15px; right: 15px; text-align: right; font-size: 1rem; line-height: 1.2;">
        </div>
    </div>

    <div class="bottom-ui">
        <div class="controls-row">
            <button class="ratio-btn" id="ratio-display" onclick="toggleRatio()">AUTO</button>
            <div class="shutter-btn" onclick="capture()"></div>
            <div class="gallery-thumb" id="last-photo" onclick="openGallery()"></div>
        </div>
    </div>

    <div id="gallery-view">
        <div class="gallery-header">
            <span style="font-size: 1.5rem; color: var(--accent-yellow);">ALBUM</span>
            <button onclick="closeGallery()" style="background:none; border:1px solid white; color:white; padding:5px 15px;">閉じる</button>
        </div>
        <div class="gallery-grid" id="gallery-grid"></div>
    </div>

    <canvas id="capture-canvas" style="display:none;"></canvas>

    <script>
        const db = new Dexie("VHSCamDB");
        db.version(1).stores({ photos: '++id, blob, timestamp' });

        const video = document.getElementById('webcam');
        const container = document.getElementById('camera-container');
        const ratioDisplay = document.getElementById('ratio-display');
        const vhsDate = document.getElementById('vhs-date');
        const canvas = document.getElementById('capture-canvas');
        const lastPhotoThumb = document.getElementById('last-photo');

        let ratioMode = 0;
        const modeLabels = ['AUTO', '3:4', '1:1'];
        const modeClasses = ['ratio-auto', 'ratio-3-4', 'ratio-1-1'];

        async function initCamera() {
            try {
                // 解像度をわざと極限(320x240)まで落としてリクエストする
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 320 },
                        height: { ideal: 240 }
                    }, 
                    audio: false 
                });
                video.srcObject = stream;
                loadLastPhoto();
            } catch (err) { alert("カメラ許可してね！"); }
        }

        function toggleRatio() {
            ratioMode = (ratioMode + 1) % modeLabels.length;
            ratioDisplay.innerText = modeLabels[ratioMode];
            container.className = modeClasses[ratioMode];
        }

        async function capture() {
            const ctx = canvas.getContext('2d');
            // 保存する画像もわざと超・小さくして荒くする
            canvas.width = 320;
            canvas.height = 240;
            
            // 保存画像にエフェクトをガッツリ反映
            ctx.filter = "contrast(1.3) brightness(1.1) saturate(1.8) blur(0.7px) sepia(0.3)";
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 日付とロゴを合成
            ctx.font = "bold 20px 'Courier New'";
            ctx.fillStyle = "#ffcc00";
            ctx.shadowColor = "black";
            ctx.shadowBlur = 4;
            ctx.fillText("VHS CAMERA", 15, 25);
            
            const now = new Date();
            const dateText = `${getFormattedDate(now)}\n${getFormattedTime(now)}`;
            const lines = dateText.split('\n');
            ctx.fillText(lines[0], canvas.width - 150, canvas.height - 40);
            ctx.fillText(lines[1], canvas.width - 100, canvas.height - 15);

            canvas.toBlob(async (blob) => {
                await db.photos.add({ blob: blob, timestamp: Date.now() });
                loadLastPhoto();
            }, 'image/jpeg', 0.5); // 保存画質も落としてザラザラ感を強調
        }

        function getFormattedDate(now) {
            const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            return `${months[now.getMonth()]} ${String(now.getDate()).padStart(2, '0')} ${now.getFullYear()}`;
        }
        function getFormattedTime(now) {
            return `PM ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
        }

        async function loadLastPhoto() {
            const lastEntry = await db.photos.orderBy('id').last();
            if (lastEntry) {
                const url = URL.createObjectURL(lastEntry.blob);
                lastPhotoThumb.style.backgroundImage = `url(${url})`;
            }
        }

        async function openGallery() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            const allPhotos = await db.photos.orderBy('id').reverse().toArray();
            allPhotos.forEach(p => {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(p.blob);
                grid.appendChild(img);
            });
            document.getElementById('gallery-view').style.display = 'flex';
        }

        function closeGallery() { document.getElementById('gallery-view').style.display = 'none'; }

        function updateDate() {
            const now = new Date();
            const timeText = getFormattedTime(now);
            const dateText = getFormattedDate(now);
            vhsDate.innerHTML = `${timeText}<br>${dateText}`;
        }

        setInterval(updateDate, 1000);
        initCamera();
    </script>
</body>
</html>
