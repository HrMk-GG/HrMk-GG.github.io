<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goog1e</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'arial', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #fff;
        }
        .google-logo-text {
            font-size: 90px;
            font-weight: 500;
            letter-spacing: -3px;
            transition: transform 0.3s ease;
        }
        .blue { color: #4285F4; }
        .red { color: #EA4335; }
        .yellow { color: #FBBC05; }
        .blue-2 { color: #4285F4; }
        .green { color: #34A853; }
        .red-2 { color: #EA4335; }

        .search-box {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .search-box:hover, .search-box:focus-within {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }
        
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4285F4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-card {
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInUp 0.4s ease forwards;
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-card:hover h3 {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="app" class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="flex justify-end p-4 text-sm items-center space-x-4">
            <a href="#" class="hover:underline">Gmail</a>
            <a href="#" class="hover:underline">画像</a>
            <button class="p-2 hover:bg-gray-100 rounded-full transition-colors">
                <svg focusable="false" viewBox="0 0 24 24" class="w-6 h-6 text-gray-600"><path d="M6,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM16,6c0,1.1 0.9,2 2,2s2,-0.9 2,-2 -0.9,-2 -2,-2 -2,0.9 -2,2zM12,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2z"></path></svg>
            </button>
            <button class="bg-blue-600 text-white px-6 py-2 rounded-md font-medium hover:bg-blue-700 shadow-md transition-all active:scale-95">ログイン</button>
        </header>

        <!-- Main Content -->
        <main id="search-interface" class="flex-grow flex flex-col items-center mt-20 fade-in">
            <!-- Logo -->
            <div id="main-logo" class="google-logo-text mb-8 select-none">
                <span class="blue">G</span><span class="red">o</span><span class="yellow">o</span><span class="blue">g</span><span class="green">1</span><span class="red">e</span>
            </div>

            <!-- Search Box -->
            <div class="w-full max-w-[584px] px-4">
                <div class="search-box flex items-center border border-gray-200 rounded-full px-5 py-3 bg-white">
                    <svg class="w-5 h-5 text-gray-400 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" id="search-input" class="flex-grow focus:outline-none text-lg" placeholder="" autocomplete="off">
                    <div class="flex items-center space-x-3 ml-2">
                        <svg class="w-5 h-5 text-blue-500 cursor-pointer hover:scale-110 transition-transform" viewBox="0 0 24 24"><path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                        <svg class="w-5 h-5 text-red-500 cursor-pointer hover:scale-110 transition-transform" viewBox="0 0 24 24"><path fill="currentColor" d="M3 5v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2zm12 4c0 1.66-1.34 3-3 3s-3-1.34-3-3 1.34-3 3-3 3 1.34 3 3zm-9 8c0-2 4-3.1 6-3.1s6 1.1 6 3.1v1H6v-1z"/></svg>
                    </div>
                </div>

                <div class="flex justify-center mt-8 space-x-3">
                    <button id="search-btn" class="bg-[#f8f9fa] border border-transparent hover:border-gray-300 hover:shadow-sm px-4 py-2 text-sm text-gray-800 rounded transition-all">Goog1e 検索</button>
                    <button class="bg-[#f8f9fa] border border-transparent hover:border-gray-300 hover:shadow-sm px-4 py-2 text-sm text-gray-800 rounded transition-all">I'm Feeling Lucky</button>
                </div>
            </div>

            <div class="mt-8 text-sm">
                Goog1e は <a href="#" class="text-blue-800 hover:underline">English</a> でも利用できます
            </div>
        </main>

        <!-- Results Page (Hidden by default) -->
        <div id="results-interface" class="hidden w-full fade-in">
            <header class="border-b flex items-center p-4 sticky top-0 bg-white z-10">
                <div id="logo-small" class="google-logo-text text-3xl mr-8 cursor-pointer select-none">
                    <span class="blue">G</span><span class="red">o</span><span class="yellow">o</span><span class="blue">g</span><span class="green">1</span><span class="red">e</span>
                </div>
                <div class="flex-grow max-w-[692px]">
                    <div class="search-box flex items-center border border-gray-200 rounded-full px-5 py-2 shadow-sm hover:shadow-md bg-white">
                        <input type="text" id="search-input-results" class="flex-grow focus:outline-none text-md">
                        <div class="flex items-center space-x-3 ml-2 border-l pl-3">
                            <svg id="clear-search" class="w-5 h-5 text-gray-500 cursor-pointer hover:text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            <svg id="search-icon-small" class="w-5 h-5 text-blue-500 cursor-pointer" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                    </div>
                </div>
            </header>

            <div class="max-w-[1200px] mx-auto px-4 md:px-44 py-4">
                <div id="status-text" class="text-gray-500 text-sm mb-6"></div>
                
                <div id="results-container" class="space-y-8">
                    <!-- Results injected here -->
                </div>

                <div id="loader" class="flex flex-col items-center justify-center py-20 hidden">
                    <div class="loading-spinner mb-4"></div>
                    <p class="text-gray-500 animate-pulse">情報を取得しています...</p>
                </div>

                <div id="error-view" class="hidden py-10 text-center">
                    <p class="text-red-500 mb-4 font-medium" id="error-message">リクエストがタイムアウトしました。もう一度お試しください。</p>
                    <button id="retry-btn" class="bg-blue-600 text-white px-6 py-2 rounded shadow hover:bg-blue-700 transition-colors">再試行する</button>
                </div>
                
                <div id="grounding-sources" class="mt-12 pt-8 border-t hidden">
                    <h4 class="text-gray-800 font-bold mb-4">参照元</h4>
                    <div id="sources-list" class="space-y-2"></div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer id="main-footer" class="bg-[#f2f2f2] text-sm text-gray-600 mt-auto">
            <div class="px-8 py-3 border-b border-gray-300">日本</div>
            <div class="px-8 py-3 flex flex-wrap justify-between">
                <div class="space-x-6 flex py-2">
                    <a href="#" class="hover:underline">Goog1e について</a>
                    <a href="#" class="hover:underline">広告</a>
                    <a href="#" class="hover:underline">ビジネス</a>
                    <a href="#" class="hover:underline">検索の仕組み</a>
                </div>
                <div class="space-x-6 flex py-2">
                    <a href="#" class="hover:underline">プライバシー</a>
                    <a href="#" class="hover:underline">規約</a>
                    <a href="#" class="hover:underline">設定</a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const apiKey = ""; // 実行環境によって自動的に提供されるため空のままでOK
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'google-clone';

        const searchInput = document.getElementById('search-input');
        const searchInputResults = document.getElementById('search-input-results');
        const searchBtn = document.getElementById('search-btn');
        const searchInterface = document.getElementById('search-interface');
        const resultsInterface = document.getElementById('results-interface');
        const resultsContainer = document.getElementById('results-container');
        const statusText = document.getElementById('status-text');
        const loader = document.getElementById('loader');
        const errorView = document.getElementById('error-view');
        const errorMessage = document.getElementById('error-message');
        const retryBtn = document.getElementById('retry-btn');
        const sourcesList = document.getElementById('sources-list');
        const groundingSection = document.getElementById('grounding-sources');
        const mainFooter = document.getElementById('main-footer');
        const logoSmall = document.getElementById('logo-small');
        const clearSearch = document.getElementById('clear-search');

        let lastQuery = "";

        async function performSearch(query) {
            if (!query || !query.trim()) return;
            lastQuery = query.trim();

            // UI Switch
            searchInterface.classList.add('hidden');
            resultsInterface.classList.remove('hidden');
            mainFooter.classList.add('hidden');
            errorView.classList.add('hidden');
            
            // Sync input values
            searchInputResults.value = lastQuery;
            
            // Show loader
            loader.classList.remove('hidden');
            resultsContainer.innerHTML = '';
            sourcesList.innerHTML = '';
            groundingSection.classList.add('hidden');
            statusText.textContent = `"${lastQuery}" を検索中...`;

            try {
                const response = await fetchWithRetry(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `以下の検索クエリに対する詳細な回答と、Goog1e検索結果のようなリストを作成してください。ユーザーは本物のGoog1eを使っている感覚を求めています。回答は日本語で行ってください。検索結果にはタイトル、スニペット（説明文）、およびそれらしいURLを含めてください。: ${lastQuery}` }] }],
                            systemInstruction: { parts: [{ text: "You are a Goog1e Search simulator. Provide a concise answer first, then a list of relevant web results with titles, snippets, and simulated URLs. Always prioritize Google Search grounding to find real info." }] },
                            tools: [{ "google_search": {} }]
                        })
                    }
                );

                const textResponse = await response.text();
                if (!textResponse) {
                    throw new Error("サーバーからのレスポンスが空です。");
                }

                let data;
                try {
                    data = JSON.parse(textResponse);
                } catch (e) {
                    throw new Error("レスポンスの解析に失敗しました。");
                }
                
                if (data.error) {
                    throw new Error(data.error.message || "API Error");
                }

                const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "結果が見つかりませんでした。";
                const attributions = data.candidates?.[0]?.groundingMetadata?.groundingAttributions || [];

                renderResults(text, attributions);
                statusText.textContent = `約 ${Math.floor(Math.random() * 1000000).toLocaleString()} 件 （0.${Math.floor(Math.random() * 99 + 10)} 秒）`;
                
            } catch (error) {
                console.error("Search Error:", error);
                errorView.classList.remove('hidden');
                errorMessage.textContent = `エラーが発生しました: ${error.message}`;
                statusText.textContent = "検索できませんでした。";
            } finally {
                loader.classList.add('hidden');
            }
        }

        function renderResults(text, attributions) {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');
            let html = '';

            const summaryLines = lines.filter(l => !l.startsWith('#') && !l.startsWith('*') && l.length > 50);
            if (summaryLines.length > 0) {
                html += `
                    <div class="mb-8 p-4 bg-gray-50 rounded-lg border border-gray-100 fade-in">
                        <h2 class="text-lg font-medium mb-2">AI による概要</h2>
                        <p class="text-[#4d5156] text-sm leading-relaxed">${summaryLines[0]}</p>
                    </div>`;
            }

            lines.forEach((line, index) => {
                const delay = index * 0.05;
                if (line.startsWith('###') || line.startsWith('**') || (line.length < 100 && line.endsWith('：'))) {
                    const cleanTitle = line.replace(/[#*：]/g, '').trim();
                    if (cleanTitle.length < 5) return;
                    
                    html += `
                        <div class="result-card" style="animation-delay: ${delay}s">
                            <div class="text-sm text-gray-700 mb-1 truncate flex items-center">
                                <div class="bg-gray-100 rounded-full w-6 h-6 flex items-center justify-center mr-2 text-[10px]">G</div>
                                https://www.goog1e.com › search › ${encodeURIComponent(cleanTitle.substring(0, 10))}
                            </div>
                            <a href="#" class="block group">
                                <h3 class="text-[#1a0dab] text-xl font-medium mb-1 group-hover:underline">${cleanTitle}</h3>
                            </a>
                            <p class="text-[#4d5156] text-sm leading-relaxed">
                                ${lastQuery} についての ${cleanTitle} に関する詳細情報です。信頼性の高いリソースから抽出された関連するコンテンツを提供しています。
                            </p>
                        </div>`;
                }
            });

            resultsContainer.innerHTML = html || `<p class="fade-in text-gray-600">${text}</p>`;

            if (attributions.length > 0) {
                groundingSection.classList.remove('hidden');
                attributions.forEach(attr => {
                    if (attr.web) {
                        const div = document.createElement('div');
                        div.className = 'text-sm fade-in mb-2';
                        div.innerHTML = `<a href="${attr.web.uri}" target="_blank" class="text-blue-700 hover:underline flex items-start">
                            <span class="mr-2 mt-1">🔗</span>
                            <span>${attr.web.title}</span>
                        </a>`;
                        sourcesList.appendChild(div);
                    }
                });
            }
        }

        async function fetchWithRetry(url, options, retries = 5) {
            let delay = 1000;
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response;
                    if (response.status === 429 || response.status >= 500) {
                    } else {
                        // 403エラーなどの場合、リトライせずにエラー内容を取得して投げる
                        const errText = await response.text();
                        throw new Error(`HTTP ${response.status}: ${errText || '未知のエラー'}`);
                    }
                } catch (e) {
                    if (i === retries - 1) throw e;
                }
                await new Promise(res => setTimeout(res, delay));
                delay *= 2;
            }
            throw new Error('複数の試行の後、リクエストが失敗しました。');
        }

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch(searchInput.value);
        });

        searchInputResults.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch(searchInputResults.value);
        });

        searchBtn.addEventListener('click', () => performSearch(searchInput.value));
        retryBtn.addEventListener('click', () => performSearch(lastQuery));
        
        clearSearch.addEventListener('click', () => {
            searchInputResults.value = '';
            searchInputResults.focus();
        });

        logoSmall.addEventListener('click', () => {
            resultsInterface.classList.add('hidden');
            searchInterface.classList.remove('hidden');
            mainFooter.classList.remove('hidden');
            searchInput.value = '';
            resultsContainer.innerHTML = '';
            sourcesList.innerHTML = '';
        });
    </script>
</body>
</html>
