<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anpan Showcase</title>
    <style>
        body {
            background-color: yellow;
            font-family: "Comic Sans MS", cursive, sans-serif;
            animation: backgroundChange 5s infinite;
        }
        @keyframes backgroundChange {
            0% { background-color: yellow; }
            50% { background-color: pink; }
            100% { background-color: yellow; }
        }
        .popup {
            position: fixed;
            width: 300px;
            height: 200px;
            background-color: red;
            color: white;
            border: 5px solid black;
            text-align: center;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }
    </style>
    <script>
        function showPopup() {
            var popup = document.getElementById('popup');
            popup.style.display = 'block';
            setTimeout(function() { popup.style.display = 'none'; }, 3000); // Popup disappears after 3 seconds
        }
        window.onload = function() {
            setInterval(showPopup, 5000); // Show popup every 5 seconds
        };
    </script>
</head>
<body>
    <h1>Welcome to Anpan Showcase!</h1>
    <div class="popup" id="popup">This is a terrible UX design!</div>
    <button onclick="showPopup()">Click me for a surprise!</button>
    <div>
        <img src="https://example.com/anpan-image.png" alt="Delicious Anpan" style="width: 100%; height: auto;" />
    </div>
</body>
</html>
