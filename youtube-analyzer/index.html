<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Stats Pro | Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: #f8fafc; 
            overflow-x: hidden;
        }
        .glass-card { 
            background: rgba(30, 41, 59, 0.6); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-color: rgba(56, 189, 248, 0.4);
        }
        .gradient-text { 
            background: linear-gradient(135deg, #38bdf8, #818cf8, #c084fc); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #38bdf8;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 md:p-12">

    <header class="w-full max-w-5xl text-center mb-12 fade-in">
        <div class="inline-block px-4 py-1.5 mb-6 text-sm font-semibold tracking-wider text-sky-400 uppercase bg-sky-400/10 rounded-full">
            Advanced Channel Analytics
        </div>
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 gradient-text tracking-tight">YouTube Analyzer</h1>
        <p class="text-slate-400 text-lg max-w-2xl mx-auto">ハンドル(@)やチャンネルURLを貼るだけで、最新の統計と推定収益をチェック ✨</p>
    </header>

    <main class="w-full max-w-5xl space-y-10 fade-in" style="animation-delay: 0.1s;">
        
        <div class="glass-card p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
            <div class="flex flex-col md:flex-row gap-5 relative z-10">
                <div class="relative flex-1">
                    <i class="fa-solid fa-at absolute left-6 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="text" id="channelInput" 
                        placeholder="URLまたは@ハンドルを入力..." 
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl pl-14 pr-6 py-5 focus:ring-2 focus:ring-sky-500 outline-none transition-all text-lg">
                </div>
                <button onclick="startAnalysis()" id="btnText"
                    class="bg-gradient-to-r from-sky-500 to-indigo-600 hover:scale-105 text-white font-bold px-10 py-5 rounded-2xl transition-all shadow-xl shadow-sky-500/20 active:scale-95 flex items-center justify-center gap-3">
                    <span>分析開始</span> <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
            <div id="loader" class="hidden absolute inset-0 bg-slate-900/80 flex items-center justify-center z-20 rounded-[2.5rem]">
                <div class="loading-spinner"></div>
                <span class="ml-4 font-bold text-sky-400">データを取得中...</span>
            </div>
        </div>

        <div id="results" class="hidden space-y-8">
            <div class="glass-card p-10 rounded-[2.5rem] flex flex-col md:flex-row items-center gap-10">
                <img id="channelThumb" src="" alt="" class="w-40 h-40 rounded-full object-cover border-4 border-slate-800 shadow-2xl">
                <div class="text-center md:text-left flex-1">
                    <h2 id="channelTitle" class="text-4xl font-extrabold mb-2 tracking-tight text-white"></h2>
                    <p id="channelHandle" class="text-sky-400 font-mono mb-4"></p>
                    <p id="channelDescription" class="text-slate-400 text-sm leading-relaxed line-clamp-2"></p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass-card p-8 rounded-[2rem] text-center border-b-4 border-sky-500">
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Total Views</p>
                    <p id="totalViews" class="text-3xl font-black text-white"></p>
                </div>
                <div class="glass-card p-8 rounded-[2rem] text-center border-b-4 border-emerald-500 bg-emerald-500/5">
                    <p class="text-emerald-400 text-xs font-bold uppercase tracking-widest mb-2">Est. Monthly</p>
                    <p id="estMonthly" class="text-4xl font-black text-emerald-400"></p>
                </div>
                <div class="glass-card p-8 rounded-[2rem] text-center border-b-4 border-amber-500 bg-amber-500/5">
                    <p class="text-amber-400 text-xs font-bold uppercase tracking-widest mb-2">Est. Yearly</p>
                    <p id="estYearly" class="text-4xl font-black text-amber-400"></p>
                </div>
            </div>

            <div class="glass-card p-8 rounded-[2.5rem]">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="statsGrid"></div>
            </div>
        </div>
    </main>

    <footer class="mt-20 text-slate-500 text-sm font-medium">
        &copy; 2026 YouTube Stats Pro | Created for Harumaki ✨
    </footer>

    <script>
        const API_KEY = 'AIzaSyAUemVInV9JUh6CXiiOgI5OizHXoDQ8lUA';

        async function startAnalysis() {
            const input = document.getElementById('channelInput').value.trim();
            const loader = document.getElementById('loader');
            const results = document.getElementById('results');

            if(!input) return alert('入力してね！💖');

            loader.classList.remove('hidden');
            results.classList.add('hidden');

            try {
                let channelId = '';

                // 1. ハンドル名 (@name) からIDを探す
                if (input.includes('@')) {
                    const handle = input.split('@')[1].split('/')[0];
                    // handleで検索（forHandleはAPIにないので、searchを使うか、channelsのforHandleパラメータを使う）
                    // ※YouTube Data APIは直接ハンドル名でchannels.listが呼べるようになったよ！
                    const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=@${handle}&key=${API_KEY}`);
                    const data = await res.json();
                    if (data.items && data.items.length > 0) {
                        channelId = data.items[0].id;
                    }
                } 
                // 2. 通常のURLからIDを抽出
                else if (input.includes('channel/')) {
                    channelId = input.split('channel/')[1].split('/')[0];
                } 
                // 3. IDそのものが入力された場合
                else if (input.startsWith('UC') && input.length === 24) {
                    channelId = input;
                }

                if (!channelId) throw new Error('チャンネルを特定できなかったよ😢');

                // 本解析
                await fetchStats(channelId);

            } catch (err) {
                alert(err.message);
            } finally {
                loader.classList.add('hidden');
            }
        }

        async function fetchStats(id) {
            const response = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${id}&key=${API_KEY}`);
            const data = await response.json();
            const channel = data.items[0];
            const stats = channel.statistics;
            const snippet = channel.snippet;

            // UI更新
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('results').classList.add('fade-in');
            
            document.getElementById('channelThumb').src = snippet.thumbnails.high.url;
            document.getElementById('channelTitle').innerText = snippet.title;
            document.getElementById('channelHandle').innerText = snippet.customUrl || '';
            document.getElementById('channelDescription').innerText = snippet.description || "No description available.";
            
            const totalViews = Number(stats.viewCount);
            document.getElementById('totalViews').innerText = totalViews.toLocaleString();

            // 収益計算 (1再生 0.3円での概算)
            const mIncome = Math.floor((totalViews / 36) * 0.3); // 3年運用と仮定
            document.getElementById('estMonthly').innerText = `¥${mIncome.toLocaleString()}`;
            document.getElementById('estYearly').innerText = `¥${(mIncome * 12).toLocaleString()}`;

            // 詳細グリッド
            const gridData = [
                { label: "Subscribers", val: Number(stats.subscriberCount).toLocaleString(), icon: "fa-users" },
                { label: "Videos", val: Number(stats.videoCount).toLocaleString(), icon: "fa-video" },
                { label: "Avg Views", val: Math.floor(totalViews / Number(stats.videoCount)).toLocaleString(), icon: "fa-chart-simple" },
                { label: "Joined", val: new Date(snippet.publishedAt).getFullYear() + "年", icon: "fa-calendar" }
            ];

            document.getElementById('statsGrid').innerHTML = gridData.map(d => `
                <div class="p-4 rounded-2xl bg-slate-800/50 border border-slate-700">
                    <i class="fa-solid ${d.icon} text-sky-400 mb-2"></i>
                    <p class="text-slate-400 text-xs font-bold uppercase">${d.label}</p>
                    <p class="text-xl font-bold text-white">${d.val}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
